<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unimpossible — Daily Word Puzzle</title>
<meta name="description" content="Probably the hardest word puzzle in the whole wide world. A daily word puzzle by JTPgaming.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- header -->
  <h1 class="wordmark"><span class="c">unim</span><span class="bone">possible</span></h1>
  <div class="tagline"><span class="strike">unwinnable</span>, but not really.</div>
  <div class="puzzle-line">
    <span>&#128197;</span>
    <span>Daily Puzzle #<span id="puzzle-number">0</span></span>
    <button class="help-pill" id="help-pill" aria-label="How to play">?</button>
  </div>

  <!-- mode toggle -->
  <div class="mode-row">
    <span class="mode-label">Mode <span id="mode-lock">&#128274; locked</span></span>
    <div class="toggle" id="toggle-wrap">
      <button id="mode-possible">Possible</button>
      <button id="mode-unimpossible">&#128293; Unimpossible</button>
    </div>
  </div>

  <!-- board: top lane / [left | grid | right] / bottom lane -->
  <div class="board">
    <div class="lane-h" id="lane-top"></div>
    <div class="mid-row">
      <div class="lane-v" id="lane-left"></div>
      <div class="grid" id="grid"></div>
      <div class="lane-v" id="lane-right"></div>
    </div>
    <div class="lane-h" id="lane-bottom"></div>
  </div>

  <!-- score panel -->
  <div class="panel">
    <div class="moves-line">Moves Remaining: <span class="c" id="score-value">100</span></div>
    <div id="middle-slot"></div>
    <button class="btn-panel-share rise" id="panel-share">&#128228; Share</button>
  </div>

  <!-- footer -->
  <div class="footer">
    <button class="pill share rise" id="foot-share"><span class="badge">&#128228;</span>Share</button>
    <button class="pill stats rise" id="foot-stats"><span class="badge">&#128202;</span>Stats</button>
    <button class="pill about rise" id="foot-about"><span class="badge">&#8505;</span>About</button>
    <button class="pill help rise" id="foot-help"><span class="badge">?</span>Help</button>
  </div>

  <div class="subnote">New puzzle every day at midnight</div>

  <!-- dev panel (remove or hide for production) -->
  <button class="dev-toggle" id="dev-toggle">&#128295; Dev Panel</button>
  <div class="dev-panel" id="dev-panel">
    <button id="dev-new">New Test Puzzle</button>
    <button id="dev-test">Test 20 (win + trap-free)</button>
    <div id="dev-result"></div>
  </div>

  <!-- modal containers -->
  <div class="overlay" id="modal-overlay"></div>
  <div class="endgame" id="endgame"></div>

  <script src="game.js"></script>
  <script src="dev.js"></script>
</body>
</html>
