<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 16px; }
h2 { color: #c8a84b; font-size: 18px; font-weight: 500; margin-bottom: 4px; letter-spacing: 0.08em; }
.subtitle { color: rgba(200,168,75,0.6); font-size: 12px; margin-bottom: 16px; letter-spacing: 0.05em; }
canvas { border-radius: 50%; }
.controls { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
button { background: rgba(200,168,75,0.15); color: #c8a84b; border: 1px solid rgba(200,168,75,0.4); padding: 7px 18px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
button:hover { background: rgba(200,168,75,0.3); }
.info { color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 12px; text-align: center; max-width: 420px; line-height: 1.6; }
.round-label { color: rgba(200,168,75,0.8); font-size: 13px; margin-top: 10px; }
</style>
</head>
<body>
<h2>WHEELS IN WHEELS</h2>
<div class="subtitle">Prototype Board — 6 Players · 6 Spokes · Counter-rotating Rings</div>
<canvas id="board" width="560" height="560"></canvas>
<div class="round-label" id="roundLabel">Round 1</div>
<div class="controls">
  <button onclick="nextRound()">▶ Next Round</button>
  <button onclick="resetBoard()">↺ Reset</button>
</div>
<div class="info">Outer ring rotates clockwise · Inner ring rotates counter-clockwise · Click next round to advance. Pockets accumulate dice across rounds.</div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const W = 560, CX = W/2, CY = W/2;
const SPOKES = 6;
const GOLD = '#c8a84b';
const GOLD_DIM = 'rgba(200,168,75,0.3)';
const GOLD_BRIGHT = '#f0d060';

const PLAYER_COLORS = [
  '#4a90d9', '#d94a4a', '#4ad98a', '#d9a44a', '#a44ad9', '#4ad9d9'
];
const PLAYER_NAMES = ['Blue', 'Red', 'Green', 'Amber', 'Purple', 'Teal'];

const R_OUTER_PRIVATE = 245;
const R_OUTER_RING = 195;
const R_INNER_RING = 130;
const R_HUB = 45;
const R_SPOKE_END = 65;

let round = 1;
let outerAngle = 0;
let innerAngle = 0;
const STEP = (2 * Math.PI) / SPOKES;

// Dice in pockets: [outerPocket1, outerPocket2, innerPocket] per spoke-position
// Each pocket holds up to 4 dice {value, player}
let outerPockets1 = Array.from({length: SPOKES}, () => []);
let outerPockets2 = Array.from({length: SPOKES}, () => []);
let innerPockets  = Array.from({length: SPOKES}, () => []);

// Hub control
let hubOwner = null;

function angle(i, offset = 0) {
  return -Math.PI/2 + i * STEP + offset;
}

function polar(r, a) {
  return { x: CX + r * Math.cos(a), y: CY + r * Math.sin(a) };
}

function drawCircle(r, stroke, fill = 'none', lw = 1.5) {
  ctx.beginPath();
  ctx.arc(CX, CY, r, 0, Math.PI*2);
  ctx.strokeStyle = stroke;
  ctx.lineWidth = lw;
  if (fill !== 'none') { ctx.fillStyle = fill; ctx.fill(); }
  ctx.stroke();
}

function drawPocket(x, y, r, dice, borderColor, label) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(20,20,40,0.85)';
  ctx.fill();
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Draw dice pips inside
  const maxDice = Math.min(dice.length, 4);
  if (maxDice === 0) {
    ctx.fillStyle = 'rgba(200,168,75,0.2)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('·', x, y);
  } else {
    const offsets = [
      [[0,0]],
      [[-5,0],[5,0]],
      [[-5,-5],[5,-5],[0,5]],
      [[-5,-5],[5,-5],[-5,5],[5,5]]
    ];
    const pos = offsets[maxDice-1];
    for (let i = 0; i < maxDice; i++) {
      const d = dice[i];
      const px = x + pos[i][0];
      const py = y + pos[i][1];
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, Math.PI*2);
      ctx.fillStyle = PLAYER_COLORS[d.player];
      ctx.fill();
      // value text
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 5px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(d.value, px, py);
    }
  }
}

function drawSpoke(i) {
  const a = angle(i);
  const inner = polar(R_SPOKE_END, a);
  const outer = polar(R_OUTER_PRIVATE - 10, a);
  ctx.beginPath();
  ctx.moveTo(inner.x, inner.y);
  ctx.lineTo(outer.x, outer.y);
  ctx.strokeStyle = GOLD_DIM;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawPrivateZone(i) {
  const a = angle(i);
  const color = PLAYER_COLORS[i];
  const mid = polar(R_OUTER_PRIVATE + 18, a);

  // Player arc label
  ctx.save();
  ctx.translate(mid.x, mid.y);
  ctx.rotate(a + Math.PI/2);
  if (a > 0 && a < Math.PI) ctx.rotate(Math.PI);
  ctx.fillStyle = color;
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(PLAYER_NAMES[i], 0, 0);
  ctx.restore();

  // Keep pockets (2 small circles near outer edge)
  const keepAngles = [a - 0.12, a + 0.12];
  keepAngles.forEach(ka => {
    const kp = polar(R_OUTER_PRIVATE - 22, ka);
    ctx.beginPath();
    ctx.arc(kp.x, kp.y, 10, 0, Math.PI*2);
    ctx.fillStyle = `${color}22`;
    ctx.fill();
    ctx.strokeStyle = `${color}88`;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = `${color}88`;
    ctx.font = '7px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('K', kp.x, kp.y);
  });

  // Save pocket
  const sp = polar(R_OUTER_PRIVATE - 22, a);
  // save is further out
  const sp2 = polar(R_OUTER_PRIVATE - 4, a);
  ctx.beginPath();
  ctx.arc(sp2.x, sp2.y, 9, 0, Math.PI*2);
  ctx.fillStyle = `${color}33`;
  ctx.fill();
  ctx.strokeStyle = `${color}99`;
  ctx.lineWidth = 1;
  ctx.setLineDash([2,2]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = `${color}99`;
  ctx.font = '7px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('S', sp2.x, sp2.y);

  // Dice tower symbol
  const tp = polar(R_OUTER_PRIVATE + 4, a);
  ctx.beginPath();
  ctx.rect(tp.x - 6, tp.y - 8, 12, 16);
  ctx.strokeStyle = `${color}55`;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = `${color}33`;
  ctx.fill();
  ctx.fillStyle = `${color}88`;
  ctx.font = '6px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⚀', tp.x, tp.y);
}

function drawOuterRing() {
  // Two pockets per spoke position on outer ring
  for (let i = 0; i < SPOKES; i++) {
    const a1 = angle(i) + outerAngle - 0.18;
    const a2 = angle(i) + outerAngle + 0.18;
    const p1 = polar(R_OUTER_RING, a1);
    const p2 = polar(R_OUTER_RING, a2);

    // Determine which player this faces
    const facingPlayer = i;

    drawPocket(p1.x, p1.y, 14, outerPockets1[i], GOLD_DIM, 'O1');
    drawPocket(p2.x, p2.y, 14, outerPockets2[i], GOLD_DIM, 'O2');
  }

  // Outer ring circle
  drawCircle(R_OUTER_RING, GOLD_DIM);

  // Label
  ctx.fillStyle = 'rgba(200,168,75,0.4)';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('OUTER RING ↻', CX, CY - R_OUTER_RING - 6);
}

function drawInnerRing() {
  for (let i = 0; i < SPOKES; i++) {
    const a = angle(i) + innerAngle;
    const p = polar(R_INNER_RING, a);
    drawPocket(p.x, p.y, 14, innerPockets[i], GOLD, 'I');
  }

  drawCircle(R_INNER_RING, GOLD_DIM);

  ctx.fillStyle = 'rgba(200,168,75,0.4)';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('INNER RING ↺', CX, CY - R_INNER_RING - 6);
}

function drawHub() {
  // Hub glow
  const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, R_HUB);
  grad.addColorStop(0, 'rgba(200,168,75,0.25)');
  grad.addColorStop(1, 'rgba(200,168,75,0)');
  ctx.beginPath();
  ctx.arc(CX, CY, R_HUB, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();

  drawCircle(R_HUB, GOLD, 'rgba(20,15,5,0.9)', 2);

  // Hub label
  ctx.fillStyle = GOLD_BRIGHT;
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('HUB', CX, CY - 7);
  ctx.fillStyle = GOLD;
  ctx.font = '9px sans-serif';
  ctx.fillText('WIN', CX, CY + 6);
}

function drawRotationArrows() {
  // Outer ring clockwise arrow
  ctx.beginPath();
  ctx.arc(CX, CY, R_OUTER_RING + 10, 0.2, 1.2);
  ctx.strokeStyle = 'rgba(200,168,75,0.35)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // arrowhead
  const a1e = polar(R_OUTER_RING + 10, 1.2);
  ctx.beginPath();
  ctx.moveTo(a1e.x - 5, a1e.y - 3);
  ctx.lineTo(a1e.x, a1e.y);
  ctx.lineTo(a1e.x - 2, a1e.y + 5);
  ctx.strokeStyle = 'rgba(200,168,75,0.5)';
  ctx.stroke();

  // Inner ring counter-clockwise arrow
  ctx.beginPath();
  ctx.arc(CX, CY, R_INNER_RING + 10, 1.2, 0.2, true);
  ctx.strokeStyle = 'rgba(200,168,75,0.35)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  const a2e = polar(R_INNER_RING + 10, 0.2);
  ctx.beginPath();
  ctx.moveTo(a2e.x + 5, a2e.y - 3);
  ctx.lineTo(a2e.x, a2e.y);
  ctx.lineTo(a2e.x + 2, a2e.y + 5);
  ctx.strokeStyle = 'rgba(200,168,75,0.5)';
  ctx.stroke();
}

function draw() {
  ctx.clearRect(0, 0, W, W);

  // Background
  ctx.beginPath();
  ctx.arc(CX, CY, W/2 - 2, 0, Math.PI*2);
  ctx.fillStyle = '#0d0d20';
  ctx.fill();

  // Outer private boundary
  drawCircle(R_OUTER_PRIVATE, 'rgba(255,255,255,0.06)', 'none', 1);

  // Spokes
  for (let i = 0; i < SPOKES; i++) drawSpoke(i);

  // Private zones
  for (let i = 0; i < SPOKES; i++) drawPrivateZone(i);

  // Rings
  drawOuterRing();
  drawInnerRing();
  drawRotationArrows();

  // Hub
  drawHub();

  // Round number in corner
  ctx.fillStyle = 'rgba(200,168,75,0.4)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`↻ +${Math.round(outerAngle * 180/Math.PI)}°  ↺ +${Math.round(-innerAngle * 180/Math.PI)}°`, 14, W - 14);
}

function nextRound() {
  round++;
  outerAngle += STEP;   // rotate outer ring one pocket clockwise
  innerAngle -= STEP;   // rotate inner ring one pocket counter-clockwise

  // Simulate a random die being placed somewhere each round
  const p = Math.floor(Math.random() * SPOKES);
  const player = (round - 2) % SPOKES;
  const value = Math.floor(Math.random() * 10) + 1;
  const die = { value, player };

  // Randomly add to outer or inner
  const target = Math.random() < 0.5 ? outerPockets1 : (Math.random() < 0.5 ? outerPockets2 : innerPockets);
  if (target[p].length < 4) target[p].push(die);

  document.getElementById('roundLabel').textContent = `Round ${round}`;
  draw();
}

function resetBoard() {
  round = 1;
  outerAngle = 0;
  innerAngle = 0;
  outerPockets1 = Array.from({length: SPOKES}, () => []);
  outerPockets2 = Array.from({length: SPOKES}, () => []);
  innerPockets  = Array.from({length: SPOKES}, () => []);
  hubOwner = null;
  document.getElementById('roundLabel').textContent = 'Round 1';
  draw();
}

draw();
</script>
</body>
</html>
