<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GlucoseLog</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --text2: #666;
    --text3: #999;
    --green: #1D9E75;
    --green-bg: #e8f7f2;
    --amber: #BA7517;
    --amber-bg: #fdf3e0;
    --red: #c0392b;
    --red-bg: #fdecea;
    --blue: #2471a3;
    --blue-bg: #eaf3fb;
    --accent: #1D9E75;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  
  /* APP SHELL */
  .app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }
  
  /* HEADER */
  .header { background: var(--surface); border-bottom: 1px solid #c0bdb4; padding: 12px 0 0; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding: 0 16px; }
  .app-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .app-title span { color: var(--accent); }
  .today-badge { font-size: 12px; color: var(--text2); background: var(--surface2); padding: 4px 10px; border-radius: 20px; }
  
  /* TABS — real raised tabs */
  .tabs { display: flex; align-items: flex-end; gap: 3px; padding: 0 12px; margin-top: 8px; }
  .tab-btn { flex: 1; padding: 8px 4px 9px; font-size: 11px; font-weight: 600; color: var(--text3);
    background: #e4e2db; border: 1px solid #c0bdb4; border-bottom: none;
    border-radius: 8px 8px 0 0; cursor: pointer; transition: all 0.12s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    position: relative; top: 1px; }
  .tab-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  .tab-btn:hover:not(.active) { background: #ede9e2; color: var(--text2); }
  .tab-btn.active { background: var(--surface); color: var(--accent); border-color: #c0bdb4;
    border-bottom-color: var(--surface); z-index: 2; padding-bottom: 10px; font-weight: 700; }
  
  /* CONTENT */
  .content { flex: 1; padding: 16px; overflow-y: auto; }
  .panel { display: none; }
  .panel.active { display: block; }
  
  /* CARDS */
  .card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
  .card-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  
  /* LOG TAB */
  .reading-big { text-align: center; margin-bottom: 20px; }
  .reading-big input { font-size: 56px; font-weight: 700; text-align: center; width: 100%; border: none; background: none; color: var(--text); outline: none; letter-spacing: -2px; }
  .reading-big input::placeholder { color: var(--border); }
  .reading-big .unit { font-size: 14px; color: var(--text3); margin-top: -4px; }
  .reading-indicator { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 16px; font-size: 13px; font-weight: 500; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; color: var(--text3); margin-bottom: 4px; font-weight: 500; }
  .field input, .field select { width: 100%; padding: 10px 12px; border-radius: var(--radius-sm); border: 2px solid #c8c6be; background: #fafaf7; color: var(--text); font-size: 15px; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); background: #fff; }
  
  .save-btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 4px; letter-spacing: -0.2px; }
  .save-btn:active { opacity: 0.85; transform: scale(0.99); }
  
  .recent-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .recent-item:last-child { border-bottom: none; }
  .recent-date { font-size: 14px; font-weight: 500; }
  .recent-time { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .recent-val { font-size: 20px; font-weight: 700; }
  .val-normal { color: var(--green); }
  .val-watch { color: var(--amber); }
  .val-high { color: var(--red); }
  .val-low { color: var(--blue); }
  
  /* STAT STRIP */
  .stat-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .stat-box { background: var(--surface); border-radius: var(--radius-sm); padding: 12px; text-align: center; border: 1px solid var(--border); }
  .stat-box .sv { font-size: 20px; font-weight: 700; }
  .stat-box .sl { font-size: 10px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.3px; }
  
  /* RANGE BUTTONS */
  .range-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .range-btn { padding: 7px 14px; font-size: 13px; font-weight: 500; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; }
  .range-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  
  /* CHART WRAP */
  .chart-wrap { position: relative; width: 100%; height: 220px; }
  
  /* A1C */
  .a1c-chart-wrap { position: relative; width: 100%; height: 200px; margin-bottom: 12px; }
  .a1c-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .a1c-row:last-child { border-bottom: none; }
  .a1c-date { font-size: 14px; font-weight: 500; }
  .a1c-val { font-size: 20px; font-weight: 700; }
  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-green { background: var(--green-bg); color: var(--green); }
  
  .a1c-add { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-top: 14px; align-items: end; }
  .a1c-add input { padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); font-size: 14px; color: var(--text); width: 100%; }
  .a1c-add button { padding: 10px 16px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  
  /* HISTORY */
  .search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
  .search-bar input { flex: 1; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); font-size: 14px; color: var(--text); }
  .search-bar select { padding: 10px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); font-size: 13px; color: var(--text); }
  
  .hist-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .hist-table th { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .hist-table td { padding: 9px 8px; border-bottom: 1px solid var(--border); }
  .hist-table tr:last-child td { border-bottom: none; }
  .hist-table .val-col { font-weight: 700; font-size: 14px; }
  .hist-table .date-col { font-weight: 500; }
  .hist-table .time-col { color: var(--text3); }
  
  .pager { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; font-size: 13px; color: var(--text2); }
  .pager button { padding: 7px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); font-size: 13px; cursor: pointer; color: var(--text); }
  .pager button:disabled { opacity: 0.4; cursor: default; }

  /* SUPABASE STUB NOTICE */
  .supabase-notice { background: var(--blue-bg); border: 1px solid #b8d9f0; border-radius: var(--radius-sm); padding: 10px 12px; font-size: 12px; color: var(--blue); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

  /* DESKTOP RESPONSIVE */
  @media (min-width: 600px) {
    .app { max-width: 100%; flex-direction: row; flex-wrap: wrap; }
    .header { width: 100%; max-width: 100%; position: sticky; top: 0; }
    .header-top { max-width: 900px; margin: 0 auto; }
    .tabs { max-width: 900px; margin: 0 auto; width: 100%; }
    .tab-btn { flex-direction: row; gap: 6px; font-size: 13px; padding: 9px 16px 10px; flex: none; }
    .content { max-width: 900px; margin: 0 auto; width: 100%; padding: 24px; }
    .stat-strip { grid-template-columns: repeat(6, 1fr); }
    .field-row { grid-template-columns: 1fr 1fr 1fr; }
    .chart-wrap { height: 300px; }
    .a1c-chart-wrap { height: 260px; }
    .reading-big input { font-size: 72px; }
    .card { padding: 20px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="app-title">Glucose<span>Log</span></div>
      <div class="today-badge" id="today-badge"></div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('log',this)">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
        Log
      </button>
      <button class="tab-btn" onclick="showTab('graph',this)">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Graph
      </button>
      <button class="tab-btn" onclick="showTab('charts',this)">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Charts
      </button>
      <button class="tab-btn" onclick="showTab('a1c',this)">
        <svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
        A1C
      </button>
      <button class="tab-btn" onclick="showTab('history',this)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        History
      </button>
    </div>
  </div>

  <div class="content">

    <!-- LOG TAB -->
    <div class="panel active" id="panel-log">
      <div class="supabase-notice">
        ☁ Cloud sync ready — connect Supabase in settings to sync across devices
      </div>
      <div class="card">
        <div class="card-label">New Reading</div>
        <div class="reading-big">
          <input type="number" id="bs-val" placeholder="—" min="40" max="600" inputmode="numeric" oninput="updateIndicator()">
          <div class="unit">mg/dL</div>
        </div>
        <div class="reading-indicator" id="reading-indicator" style="color:var(--text3);">
          <span class="dot" id="ind-dot" style="background:var(--border)"></span>
          <span id="ind-label">enter a reading</span>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Date</label>
            <input type="date" id="entry-date">
          </div>
          <div class="field">
            <label>Time</label>
            <input type="time" id="entry-time">
          </div>
        </div>
        <div class="field" style="margin-bottom:12px;">
          <label>Notes (optional)</label>
          <input type="text" id="entry-notes" placeholder="fasting, after meal…">
        </div>
        <button class="save-btn" onclick="saveReading()">Save Reading</button>
      </div>

      <div class="card">
        <div class="card-label">Recent</div>
        <div id="recent-list"></div>
      </div>

      <div class="card">
        <div class="card-label">This week</div>
        <div style="position:relative;width:100%;height:130px;">
          <canvas id="weekChart" role="img" aria-label="This week's blood sugar readings"></canvas>
        </div>
      </div>
    </div>

    <!-- CHARTS TAB -->
    <div class="panel" id="panel-charts">
      <!-- Sub-tab row -->
      <div style="display:flex;gap:8px;margin-bottom:14px;">
        <button class="range-btn active" id="charts-sub-yearly" onclick="setChartsView('yearly',this)">Yearly</button>
        <button class="range-btn" id="charts-sub-monthly" onclick="setChartsView('monthly',this)">Monthly</button>
      </div>

      <!-- YEARLY VIEW -->
      <div id="charts-yearly">
        <div class="card">
          <div class="card-label">Annual averages</div>
          <div style="position:relative;width:100%;height:200px;margin-bottom:0;">
            <canvas id="yearlyAvgChart" role="img" aria-label="Average blood sugar by year"></canvas>
          </div>
        </div>
        <div id="yearly-months-container"></div>
      </div>

      <!-- MONTHLY VIEW -->
      <div id="charts-monthly" style="display:none;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <button onclick="monthNav(-1)" style="padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;font-size:16px;">‹</button>
          <div id="month-nav-label" style="flex:1;text-align:center;font-size:15px;font-weight:600;"></div>
          <button onclick="monthNav(1)" style="padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;font-size:16px;">›</button>
        </div>
        <div class="stat-strip" id="month-stats" style="grid-template-columns:repeat(3,1fr);"></div>
        <div class="card" style="margin-top:8px;">
          <div style="position:relative;width:100%;height:220px;">
            <canvas id="monthlyChart" role="img" aria-label="Monthly blood sugar readings"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- GRAPH TAB -->
    <div class="panel" id="panel-graph">
      <div class="stat-strip" id="graph-stats"></div>
      <div class="card">
        <div class="range-row">
          <button class="range-btn active" onclick="setRange(7,this)">7d</button>
          <button class="range-btn" onclick="setRange(30,this)">30d</button>
          <button class="range-btn" onclick="setRange(90,this)">90d</button>
          <button class="range-btn" onclick="setRange(180,this)">6mo</button>
          <button class="range-btn" onclick="setRange(365,this)">1yr</button>
          <button class="range-btn" onclick="setRange(0,this)">All</button>
        </div>
        <div class="chart-wrap">
          <canvas id="glucoseChart" role="img" aria-label="Blood sugar readings over time"></canvas>
        </div>
      </div>
    </div>

    <!-- A1C TAB -->
    <div class="panel" id="panel-a1c">
      <div class="card">
        <div class="card-label">A1C History</div>
        <div class="a1c-chart-wrap">
          <canvas id="a1cChart" role="img" aria-label="A1C values over time"></canvas>
        </div>
        <div id="a1c-list"></div>
        <div class="a1c-add">
          <div class="field">
            <label>Date</label>
            <input type="date" id="a1c-date">
          </div>
          <div class="field">
            <label>A1C %</label>
            <input type="number" id="a1c-val" placeholder="e.g. 6.5" step="0.1" min="4" max="15">
          </div>
          <button onclick="saveA1C()">Add</button>
        </div>
      </div>
    </div>

    <!-- HISTORY TAB -->
    <div class="panel" id="panel-history">
      <div class="card">
        <div class="search-bar">
          <input type="text" id="hist-search" placeholder="Search date or value…" oninput="renderHistory()">
          <select id="hist-filter" onchange="renderHistory()">
            <option value="all">All</option>
            <option value="high">High (&gt;180)</option>
            <option value="watch">Watch (141–180)</option>
            <option value="normal">Normal (70–140)</option>
            <option value="low">Low (&lt;70)</option>
          </select>
        </div>
        <div id="hist-count" style="font-size:12px;color:var(--text3);margin-bottom:8px;"></div>
        <table class="hist-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Time</th>
              <th>mg/dL</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="hist-body"></tbody>
        </table>
        <div class="pager">
          <button onclick="prevPage()" id="prev-btn">← Prev</button>
          <span id="page-info"></span>
          <button onclick="nextPage()" id="next-btn">Next →</button>
        </div>
      </div>
    </div>

  </div>
</div>

function getNewReadings() {
  try { return JSON.parse(localStorage.getItem('glucose_new') || '[]'); } catch(e) { return []; }
}
function saveNewReading(r) {
  const arr = getNewReadings();
  arr.push(r);
  arr.sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
  localStorage.setItem('glucose_new', JSON.stringify(arr));
}
function getA1CData() {
  try { return JSON.parse(localStorage.getItem('glucose_a1c') || 'null') || A1C_DATA; } catch(e) { return A1C_DATA; }
}
function saveA1CData(arr) { localStorage.setItem('glucose_a1c', JSON.stringify(arr)); }

// ============================================================
// COMBINED DATA
// ============================================================
function getAllReadings() {
  const newOnes = getNewReadings().map(r => [r.date, r.time, r.val, r.notes || '']);
  const legacy = LEGACY_DATA.map(r => [r[0], r[1], r[2], 'legacy']);
  return [...legacy, ...newOnes].sort((a,b) => (a[0]+a[1]).localeCompare(b[0]+b[1]));
}

function valClass(v) {
  if (v > 180) return 'val-high';
  if (v > 140) return 'val-watch';
  if (v < 70) return 'val-low';
  return 'val-normal';
}
function valLabel(v) {
  if (v > 180) return {color:'var(--red)', dot:'var(--red)', label:'High'};
  if (v > 140) return {color:'var(--amber)', dot:'var(--amber)', label:'Watch'};
  if (v < 70) return {color:'var(--blue)', dot:'var(--blue)', label:'Low'};
  return {color:'var(--green)', dot:'var(--green)', label:'In range'};
}
function fmtDate(d) {
  const [y,m,day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(day)}, ${y}`;
}
function fmtTime(t) {
  const [h,m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

window.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  document.getElementById('today-badge').textContent =
    now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  document.getElementById('entry-date').value = now.toISOString().split('T')[0];
  document.getElementById('entry-time').value =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  document.getElementById('a1c-date').value = now.toISOString().split('T')[0];
  renderRecent();
});

function showTab(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
  if (name === 'graph') initGraph();
  if (name === 'charts') initChartsTab();
  if (name === 'a1c') initA1C();
  if (name === 'history') { histPage = 0; renderHistory(); }
}

// LOG TAB
// ============================================================
function updateIndicator() {
  const v = parseInt(document.getElementById('bs-val').value);
  const ind = document.getElementById('reading-indicator');
  const dot = document.getElementById('ind-dot');
  const lbl = document.getElementById('ind-label');
  if (isNaN(v)) { dot.style.background='var(--border)'; lbl.textContent='enter a reading'; ind.style.color='var(--text3)'; return; }
  const info = valLabel(v);
  dot.style.background = info.dot;
  lbl.textContent = info.label;
  ind.style.color = info.color;
}

function saveReading() {
  const v = parseInt(document.getElementById('bs-val').value);
  const d = document.getElementById('entry-date').value;
  const t = document.getElementById('entry-time').value;
  const n = document.getElementById('entry-notes').value.trim();
  if (!v || v < 40 || v > 600 || !d || !t) { alert('Please enter a valid reading (40–600) and date/time.'); return; }
  saveNewReading({date:d, time:t, val:v, notes:n});
  document.getElementById('bs-val').value = '';
  document.getElementById('entry-notes').value = '';
  updateIndicator();
  renderRecent();
  alert('Saved!');
}

function renderRecent() {
  const all = getAllReadings();
  const recent = all.slice(-5).reverse();
  const el = document.getElementById('recent-list');
  el.innerHTML = recent.map(r => `
    <div class="recent-item">
      <div>
        <div class="recent-date">${fmtDate(r[0])}</div>
        <div class="recent-time">${fmtTime(r[1])}</div>
      </div>
      <div class="recent-val ${valClass(r[2])}">${r[2]}</div>
    </div>`).join('');
  renderWeekChart();
}

let weekChartInst = null;
function renderWeekChart() {
  const all = getAllReadings();
  const today = new Date();
  const dow = today.getDay(); // 0=Sun
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((dow + 6) % 7));
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const labels = [], vals = [], colors = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const ds = d.toISOString().split('T')[0];
    labels.push(days[i]);
    const dayReadings = all.filter(r => r[0] === ds);
    if (dayReadings.length) {
      const avg = Math.round(dayReadings.reduce((s,r)=>s+r[2],0)/dayReadings.length);
      vals.push(avg);
      colors.push(avg > 180 ? '#c0392b99' : avg > 140 ? '#BA751799' : avg < 70 ? '#2471a399' : '#1D9E7599');
    } else {
      vals.push(null);
      colors.push('#e0ded899');
    }
  }
  if (weekChartInst) weekChartInst.destroy();
  weekChartInst = new Chart(document.getElementById('weekChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: vals,
        backgroundColor: colors,
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: {display:false}, tooltip: { callbacks: { label: ctx => ctx.raw ? ` ${ctx.raw} mg/dL` : ' no data' } } },
      scales: {
        y: { min: 50, max: 260, ticks: { color:'#999', font:{size:10}, maxTicksLimit:4 }, grid: { color:'rgba(0,0,0,0.05)' } },
        x: { ticks: { color:'#555', font:{size:12,weight:'500'} }, grid: {display:false} }
      }
    }
  });
}

let glucoseChart = null;
let currentRange = 7;

function setRange(days, btn) {
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentRange = days;
  initGraph();
}

function initGraph() {
  const all = getAllReadings();
  let subset = all;
  if (currentRange > 0) {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - currentRange);
    const cutStr = cutoff.toISOString().split('T')[0];
    subset = all.filter(r => r[0] >= cutStr);
  }

  const vals = subset.map(r => r[2]);
  const avg = vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
  const high = vals.length ? Math.max(...vals) : 0;
  const low = vals.length ? Math.min(...vals) : 0;

  const statsEl = document.getElementById('graph-stats');
  statsEl.innerHTML = [
    {sv:avg, sl:'Average', color:'var(--text)'},
    {sv:high, sl:'High', color:'var(--red)'},
    {sv:low, sl:'Low', color:'var(--green)'},
    {sv:vals.length, sl:'Readings', color:'var(--text)'},
    {sv: '6.6%', sl:'Latest A1C', color:'var(--blue)'},
    {sv:'90–110', sl:"Dr's target", color:'var(--amber)'}
  ].map(s => `<div class="stat-box"><div class="sv" style="color:${s.color}">${s.sv}</div><div class="sl">${s.sl}</div></div>`).join('');

  // Thin out for performance if too many points
  let displaySubset = subset;
  if (subset.length > 200) {
    const step = Math.ceil(subset.length / 200);
    displaySubset = subset.filter((_,i) => i % step === 0 || i === subset.length-1);
  }

  const labels = displaySubset.map(r => {
    const [y,m,d] = r[0].split('-');
    return `${m}/${d}`;
  });
  const data = displaySubset.map(r => r[2]);
  const ptColors = data.map(v => v > 180 ? '#c0392b' : v < 70 ? '#2471a3' : '#1D9E75');

  if (glucoseChart) glucoseChart.destroy();
  glucoseChart = new Chart(document.getElementById('glucoseChart'), {
    type: subset.length > 60 ? 'bar' : 'line',
    data: {
      labels,
      datasets: [{
        label: 'Blood sugar',
        data,
        borderColor: '#1D9E75',
        backgroundColor: subset.length > 60 ? ptColors.map(c => c+'99') : 'rgba(29,158,117,0.08)',
        pointBackgroundColor: ptColors,
        pointRadius: subset.length > 60 ? 0 : 4,
        tension: 0.3,
        fill: subset.length <= 60,
        borderWidth: subset.length > 60 ? 0 : 2,
        barPercentage: 0.6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {display:false},
        tooltip: { callbacks: { label: ctx => ` ${ctx.raw} mg/dL` } }
      },
      scales: {
        y: {
          min: 50, max: 280,
          grid: { color:'rgba(0,0,0,0.05)' },
          ticks: { color:'#999', font:{size:10} }
        },
        x: {
          grid: {display:false},
          ticks: { color:'#999', font:{size:10}, maxTicksLimit:10, maxRotation:0 }
        }
      }
    }
  });
}

// ============================================================
// A1C TAB
// ============================================================
let a1cChart = null;

function a1cBadge(v) {
  if (v >= 8) return '<span class="badge badge-red">High</span>';
  if (v >= 6.5) return '<span class="badge badge-amber">Watch</span>';
  return '<span class="badge badge-green">Good</span>';
}

function initA1C() {
  const data = getA1CData();
  const list = document.getElementById('a1c-list');
  list.innerHTML = [...data].reverse().map(r => `
    <div class="a1c-row">
      <div><div class="a1c-date">${fmtDate(r.date)}</div></div>
      <div style="display:flex;align-items:center;gap:10px;">${a1cBadge(r.val)}<div class="a1c-val" style="color:${r.val>=8?'var(--red)':r.val>=6.5?'var(--amber)':'var(--green)'}">${r.val}%</div></div>
    </div>`).join('');

  if (a1cChart) a1cChart.destroy();
  a1cChart = new Chart(document.getElementById('a1cChart'), {
    type:'line',
    data:{
      labels: data.map(r => fmtDate(r.date).replace(/,\s*\d{4}/,'')),
      datasets:[{
        label:'A1C',
        data: data.map(r=>r.val),
        borderColor:'#2471a3',
        backgroundColor:'rgba(36,113,163,0.08)',
        pointBackgroundColor: data.map(r => r.val>=8?'#c0392b':r.val>=6.5?'#BA7517':'#1D9E75'),
        pointRadius:6, tension:0.3, fill:true, borderWidth:2
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        y:{min:5,max:11, ticks:{callback:v=>v+'%', color:'#999', font:{size:10}}, grid:{color:'rgba(0,0,0,0.05)'}},
        x:{ticks:{color:'#999',font:{size:10}}, grid:{display:false}}
      }
    }
  });
}

function saveA1C() {
  const d = document.getElementById('a1c-date').value;
  const v = parseFloat(document.getElementById('a1c-val').value);
  if (!d || isNaN(v) || v < 4 || v > 15) { alert('Enter a valid date and A1C value (4–15).'); return; }
  const arr = getA1CData();
  arr.push({date:d, val:v});
  arr.sort((a,b)=>a.date.localeCompare(b.date));
  saveA1CData(arr);
  document.getElementById('a1c-val').value = '';
  if (a1cChart) { a1cChart.destroy(); a1cChart=null; }
  initA1C();
}

// ============================================================
// HISTORY TAB
// ============================================================
let histPage = 0;
const HIST_PAGE_SIZE = 30;

function renderHistory() {
  const all = getAllReadings().reverse();
  const search = document.getElementById('hist-search').value.toLowerCase();
  const filter = document.getElementById('hist-filter').value;

  let filtered = all.filter(r => {
    if (search && !r[0].includes(search) && !String(r[2]).includes(search) && !fmtDate(r[0]).toLowerCase().includes(search)) return false;
    if (filter === 'high' && r[2] <= 180) return false;
    if (filter === 'watch' && (r[2] < 141 || r[2] > 180)) return false;
    if (filter === 'normal' && (r[2] < 70 || r[2] > 140)) return false;
    if (filter === 'low' && r[2] >= 70) return false;
    return true;
  });

  const total = filtered.length;
  const totalPages = Math.ceil(total / HIST_PAGE_SIZE);
  if (histPage >= totalPages) histPage = Math.max(0, totalPages-1);
  const page = filtered.slice(histPage*HIST_PAGE_SIZE, (histPage+1)*HIST_PAGE_SIZE);

  document.getElementById('hist-count').textContent = `${total.toLocaleString()} readings`;
  document.getElementById('hist-body').innerHTML = page.map(r => `
    <tr>
      <td class="date-col">${fmtDate(r[0])}</td>
      <td class="time-col">${fmtTime(r[1])}</td>
      <td class="val-col ${valClass(r[2])}">${r[2]}</td>
      <td style="color:var(--text3);font-size:12px;">${r[3]==='legacy'?'legacy':r[3]||''}</td>
    </tr>`).join('');

  document.getElementById('page-info').textContent = total ? `${histPage+1} / ${totalPages}` : '—';
  document.getElementById('prev-btn').disabled = histPage === 0;
  document.getElementById('next-btn').disabled = histPage >= totalPages-1;
}

function prevPage() { if (histPage > 0) { histPage--; renderHistory(); } }
function nextPage() { histPage++; renderHistory(); }

// ============================================================
// CHARTS TAB
// ============================================================
let chartsView = 'yearly';
let currentMonthOffset = 0; // 0 = current month
let yearlyAvgChartInst = null, monthlyChartInst = null;

function setChartsView(view, btn) {
  chartsView = view;
  document.querySelectorAll('#panel-charts .range-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('charts-yearly').style.display = view === 'yearly' ? '' : 'none';
  document.getElementById('charts-monthly').style.display = view === 'monthly' ? '' : 'none';
  if (view === 'yearly') renderYearly();
  if (view === 'monthly') renderMonthly();
}

function initChartsTab() {
  setChartsView('yearly', document.getElementById('charts-sub-yearly'));
}

function renderYearly() {
  const all = getAllReadings();
  // Group by year
  const byYear = {};
  all.forEach(r => {
    const y = r[0].split('-')[0];
    if (!byYear[y]) byYear[y] = [];
    byYear[y].push(r[2]);
  });
  const years = Object.keys(byYear).sort();
  const avgs = years.map(y => Math.round(byYear[y].reduce((a,b)=>a+b,0)/byYear[y].length));

  if (yearlyAvgChartInst) yearlyAvgChartInst.destroy();
  yearlyAvgChartInst = new Chart(document.getElementById('yearlyAvgChart'), {
    type: 'bar',
    data: {
      labels: years,
      datasets: [{
        label: 'Avg mg/dL',
        data: avgs,
        backgroundColor: avgs.map(v => v > 180 ? '#c0392b99' : v > 140 ? '#BA751799' : '#1D9E7599'),
        borderRadius: 6
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {display:false},
        tooltip: { callbacks: { label: ctx => ` ${ctx.raw} mg/dL avg` } }
      },
      scales: {
        y: { min: 80, ticks:{color:'#999',font:{size:10}}, grid:{color:'rgba(0,0,0,0.05)'} },
        x: { ticks:{color:'#555',font:{size:12,weight:'500'}}, grid:{display:false} }
      }
    }
  });

  // Monthly breakdown cards
  const container = document.getElementById('yearly-months-container');
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  // Group by year-month
  const byYM = {};
  all.forEach(r => {
    const ym = r[0].slice(0,7);
    if (!byYM[ym]) byYM[ym] = [];
    byYM[ym].push(r[2]);
  });

  let html = '';
  years.forEach(y => {
    const monthsInYear = Object.keys(byYM).filter(k=>k.startsWith(y)).sort();
    const mLabels = monthsInYear.map(m => MONTHS[parseInt(m.split('-')[1])-1]);
    const mAvgs = monthsInYear.map(m => Math.round(byYM[m].reduce((a,b)=>a+b,0)/byYM[m].length));
    const mColors = mAvgs.map(v => v > 180 ? '#c0392b99' : v > 140 ? '#BA751799' : '#1D9E7599');
    html += `<div class="card" style="margin-bottom:12px;">
      <div class="card-label">${y} — monthly averages</div>
      <div style="position:relative;width:100%;height:140px;">
        <canvas id="ym-${y}" role="img" aria-label="${y} monthly averages"></canvas>
      </div>
    </div>`;
    // Store data for after render
    window['_ymData_'+y] = {labels:mLabels, avgs:mAvgs, colors:mColors};
  });
  container.innerHTML = html;

  // Draw each year's monthly chart
  years.forEach(y => {
    const d = window['_ymData_'+y];
    new Chart(document.getElementById('ym-'+y), {
      type:'bar',
      data:{
        labels:d.labels,
        datasets:[{data:d.avgs, backgroundColor:d.colors, borderRadius:4}]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>` ${ctx.raw}`}}},
        scales:{
          y:{min:80, ticks:{color:'#999',font:{size:9},maxTicksLimit:4}, grid:{color:'rgba(0,0,0,0.05)'}},
          x:{ticks:{color:'#555',font:{size:10}}, grid:{display:false}}
        }
      }
    });
  });
}

function monthNav(dir) {
  currentMonthOffset += dir;
  renderMonthly();
}

function renderMonthly() {
  const all = getAllReadings();
  const now = new Date();
  const target = new Date(now.getFullYear(), now.getMonth() + currentMonthOffset, 1);
  const y = target.getFullYear();
  const m = String(target.getMonth()+1).padStart(2,'0');
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('month-nav-label').textContent = `${MONTHS[target.getMonth()]} ${y}`;

  const monthReadings = all.filter(r => r[0].startsWith(`${y}-${m}`));
  const vals = monthReadings.map(r=>r[2]);
  const avg = vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
  const high = vals.length ? Math.max(...vals) : 0;
  const low = vals.length ? Math.min(...vals) : 0;

  document.getElementById('month-stats').innerHTML = [
    {sv:avg||'—', sl:'Average', color:'var(--text)'},
    {sv:high||'—', sl:'High', color:'var(--red)'},
    {sv:low||'—', sl:'Low', color:'var(--green)'}
  ].map(s=>`<div class="stat-box"><div class="sv" style="color:${s.color}">${s.sv}</div><div class="sl">${s.sl}</div></div>`).join('');

  const labels = monthReadings.map(r => parseInt(r[0].split('-')[2]));
  const data = monthReadings.map(r => r[2]);
  const ptColors = data.map(v => v>180?'#c0392b':v<70?'#2471a3':'#1D9E75');

  if (monthlyChartInst) monthlyChartInst.destroy();
  if (!monthReadings.length) return;
  monthlyChartInst = new Chart(document.getElementById('monthlyChart'), {
    type: 'bar',
    data: {
      labels,
      datasets:[{
        data, backgroundColor: ptColors.map(c=>c+'99'), borderRadius:3
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>` ${ctx.raw} mg/dL`}}},
      scales:{
        y:{min:50,max:280, ticks:{color:'#999',font:{size:10},maxTicksLimit:5}, grid:{color:'rgba(0,0,0,0.05)'}},
        x:{ticks:{color:'#555',font:{size:10},maxTicksLimit:15}, grid:{display:false}}
      }
    }
  });
}
</script>
