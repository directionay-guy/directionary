<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>POCKETS — Score Sheet</title>
<style>
/* ── Palette ─────────────────────────────── */
:root {
    --navy:      #1a2744;
    --navy-mid:  #243258;
    --navy-lt:   #2e3f6e;
    --burg:      #6e3030;
    --burg-deep: #4d2020;
    --burg-lt:   #8a3838;
    --gold:      #c8a84b;
    --gold-dim:  rgba(200,168,75,0.35);
    --parch:     #f5f0e4;
    --parch-soft:#ddd0b0;
    --ink:       #2a1508;
    --cream:     #fffdf6;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
    background: var(--navy);
    color: var(--parch);
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 15px;
    min-height: 100vh;
}

/* ── App container ───────────────────────── */
#app {
    max-width: 600px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--navy);
}

/* ── Header ─────────────────────────────── */
header {
    background: linear-gradient(180deg, var(--navy-mid) 0%, var(--navy) 100%);
    border-bottom: 1px solid var(--gold-dim);
    padding: 10px 14px 8px;
    text-align: center;
    position: relative;
}
header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
        90deg, transparent 0, transparent 5px,
        rgba(200,168,75,0.04) 5px, rgba(200,168,75,0.04) 6px
    );
    pointer-events: none;
}
header h1 {
    font-size: 1.5em;
    letter-spacing: 0.16em;
    color: var(--gold);
    text-shadow: 0 0 14px rgba(200,168,75,0.45);
    font-weight: normal;
    position: relative; z-index: 1;
}
header p {
    font-size: 0.72em;
    color: var(--parch-soft);
    letter-spacing: 0.08em;
    position: relative; z-index: 1;
}

/* ── Tab bar ─────────────────────────────── */
#tabBar {
    display: flex;
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid var(--gold-dim);
}
.tab-btn {
    flex: 1;
    padding: 9px 4px;
    background: transparent;
    border: none;
    color: var(--parch-soft);
    font-family: inherit;
    font-size: 0.78em;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
}
.tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
}
.tab-btn:hover { color: var(--parch); }

/* ── Panels ─────────────────────────────── */
.panel { display: none; flex: 1; flex-direction: column; }
.panel.active { display: flex; }

/* ════════════════════════════════════════
   SCORE SHEET PANEL
   ════════════════════════════════════════ */
#sheetPanel { overflow-y: auto; }

/* Player name bar */
#playerBar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid var(--gold-dim);
}
.name-block { display: flex; flex-direction: column; gap: 2px; }
.name-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--gold-dim);
    color: inherit;
    font-family: inherit;
    font-size: 0.95em;
    font-weight: bold;
    letter-spacing: 0.06em;
    text-align: center;
    width: 100%;
    padding: 2px 4px;
    outline: none;
}
.name-input:focus { border-bottom-color: var(--gold); }
#p1block .name-input { color: #7ab0ee; }
#p2block .name-input { color: #e07878; }
.running-total {
    font-size: 2em;
    font-weight: bold;
    color: var(--gold);
    text-align: center;
    line-height: 1;
}
#p1block .running-total { color: #7ab0ee; }
#p2block .running-total { color: #e07878; }
.vs-label {
    color: var(--gold-dim);
    font-size: 0.8em;
    letter-spacing: 0.1em;
    text-align: center;
}

/* Round table */
#roundTable {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9em;
}
#roundTable thead th {
    background: var(--navy-mid);
    color: var(--gold);
    font-weight: normal;
    letter-spacing: 0.06em;
    font-size: 0.8em;
    text-transform: uppercase;
    padding: 6px 4px;
    border-bottom: 1px solid var(--gold-dim);
    position: sticky;
    top: 0;
    z-index: 5;
}
#roundTable thead th:nth-child(2) { color: #7ab0ee; }
#roundTable thead th:nth-child(3) { color: #e07878; }

#roundTable tbody tr { border-bottom: 1px solid rgba(200,168,75,0.1); }
#roundTable tbody tr:nth-child(even) { background: rgba(255,255,255,0.03); }
#roundTable tbody tr.rolldown-row { background: rgba(200,168,75,0.10); }
#roundTable tbody tr.rolldown-row td { border-top: 1px solid var(--gold-dim); }

#roundTable td {
    padding: 4px 3px;
    text-align: center;
    vertical-align: middle;
}
.rnd-num {
    color: var(--parch-soft);
    font-size: 0.75em;
    width: 32px;
}
.score-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(200,168,75,0.20);
    border-radius: 3px;
    color: var(--parch);
    font-family: inherit;
    font-size: 1.05em;
    text-align: center;
    padding: 6px 2px;
    outline: none;
    -webkit-appearance: none;
    min-height: 36px;
}
.score-input:focus {
    background: rgba(255,255,255,0.12);
    border-color: var(--gold);
}
.score-input.p1-input { color: #9fc4f4; }
.score-input.p2-input { color: #f4a0a0; }

.rd-toggle {
    width: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.rd-btn {
    width: 26px; height: 26px;
    background: transparent;
    border: 1px solid var(--gold-dim);
    border-radius: 50%;
    color: var(--gold-dim);
    font-size: 0.85em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
}
.rd-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--navy);
    font-weight: bold;
}

/* Totals row */
#totalsRow td {
    background: var(--navy-mid);
    border-top: 1px solid var(--gold-dim);
    font-weight: bold;
    padding: 6px 3px;
    font-size: 0.85em;
    color: var(--gold);
    letter-spacing: 0.04em;
    text-transform: uppercase;
}

/* 100+ warning */
#triggerNote {
    text-align: center;
    font-size: 0.78em;
    color: var(--gold);
    padding: 5px 10px;
    background: rgba(200,168,75,0.08);
    border-top: 1px solid var(--gold-dim);
    display: none;
    letter-spacing: 0.04em;
}

/* Winner banner */
#winnerBanner {
    display: none;
    text-align: center;
    padding: 14px 10px;
    background: linear-gradient(180deg, rgba(200,168,75,0.15) 0%, transparent 100%);
    border-top: 1px solid var(--gold-dim);
}
#winnerBanner .wname {
    font-size: 1.6em;
    color: var(--gold);
    letter-spacing: 0.1em;
    animation: goldPulse 2s ease-in-out infinite;
}
#winnerBanner .wmargin {
    font-size: 0.8em;
    color: var(--parch-soft);
    margin-top: 2px;
}
@keyframes goldPulse {
    0%,100% { text-shadow: 0 0 8px rgba(200,168,75,0.5); }
    50%      { text-shadow: 0 0 22px rgba(200,168,75,0.9); }
}

/* Action buttons */
#sheetActions {
    display: flex;
    gap: 8px;
    padding: 10px;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid var(--gold-dim);
    margin-top: auto;
}
.action-btn {
    flex: 1;
    padding: 10px 6px;
    font-family: inherit;
    font-size: 0.82em;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    border: 1px solid var(--gold-dim);
}
.btn-save {
    background: linear-gradient(180deg, var(--burg) 0%, var(--burg-deep) 100%);
    color: var(--parch);
}
.btn-save:disabled { opacity: 0.4; cursor: default; }
.btn-clear {
    background: rgba(200,168,75,0.1);
    color: var(--parch-soft);
}
.btn-add-round {
    background: rgba(200,168,75,0.08);
    color: var(--gold);
    border-color: var(--gold-dim);
}

/* ════════════════════════════════════════
   HISTORY PANEL
   ════════════════════════════════════════ */
#historyPanel { overflow-y: auto; }

.win-counts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid var(--gold-dim);
}
.win-block {
    padding: 10px 14px;
    text-align: center;
}
.win-block:first-child { border-right: 1px solid var(--gold-dim); }
.win-label { font-size: 0.72em; text-transform: uppercase; letter-spacing: 0.08em; color: var(--parch-soft); }
.win-name  { font-size: 1em; font-weight: bold; margin: 2px 0; }
.win-count { font-size: 1.8em; font-weight: bold; color: var(--gold); line-height: 1; }
#p1wins .win-name { color: #7ab0ee; }
#p2wins .win-name { color: #e07878; }

.history-empty {
    text-align: center;
    color: var(--parch-soft);
    font-size: 0.85em;
    padding: 30px 20px;
    letter-spacing: 0.06em;
    font-style: italic;
}

.game-card {
    border-bottom: 1px solid rgba(200,168,75,0.12);
    padding: 10px 12px;
    cursor: pointer;
}
.game-card:hover { background: rgba(255,255,255,0.03); }
.game-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
}
.game-date { font-size: 0.72em; color: var(--parch-soft); }
.game-num  { font-size: 0.72em; color: var(--gold-dim); }
.game-scores {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 4px;
    font-size: 0.95em;
}
.gs-p1 { color: #7ab0ee; }
.gs-p2 { color: #e07878; text-align: right; }
.gs-p1 .score-val,
.gs-p2 .score-val { font-size: 1.3em; font-weight: bold; }
.gs-winner { color: var(--gold); font-size: 0.7em; text-align: center; letter-spacing: 0.06em; }
.gs-divider { color: var(--gold-dim); text-align: center; font-size: 0.8em; }
.game-rounds { font-size: 0.7em; color: var(--parch-soft); margin-top: 3px; }
.game-card.winner-p1 { border-left: 3px solid #7ab0ee; }
.game-card.winner-p2 { border-left: 3px solid #e07878; }

#clearHistory {
    margin: 12px;
    padding: 8px;
    width: calc(100% - 24px);
    background: rgba(110,48,48,0.3);
    border: 1px solid var(--burg);
    color: var(--parch-soft);
    font-family: inherit;
    font-size: 0.78em;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 4px;
}

/* ════════════════════════════════════════
   RECORDS PANEL
   ════════════════════════════════════════ */
#recordsPanel { overflow-y: auto; }

.records-empty {
    text-align: center;
    color: var(--parch-soft);
    font-size: 0.85em;
    padding: 30px 20px;
    font-style: italic;
    letter-spacing: 0.06em;
}

.records-section {
    border-bottom: 1px solid var(--gold-dim);
    padding: 10px 12px;
}
.records-title {
    font-size: 0.75em;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gold);
    margin-bottom: 8px;
}
.stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}
.stat-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    padding: 8px 10px;
    text-align: center;
}
.stat-val  { font-size: 1.6em; font-weight: bold; color: var(--gold); line-height: 1; }
.stat-lbl  { font-size: 0.68em; text-transform: uppercase; letter-spacing: 0.06em; color: var(--parch-soft); margin-top: 2px; }
.stat-name { font-size: 0.72em; color: var(--parch-soft); margin-top: 1px; }

.top5-table { width: 100%; border-collapse: collapse; font-size: 0.82em; }
.top5-table th {
    text-align: left;
    padding: 4px 6px;
    color: var(--gold);
    font-weight: normal;
    font-size: 0.8em;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--gold-dim);
}
.top5-table td { padding: 5px 6px; border-bottom: 1px solid rgba(200,168,75,0.08); }
.top5-table tr:nth-child(1) td { color: var(--gold); }
.top5-table .t5-rank { color: var(--gold-dim); width: 24px; text-align: center; }
.top5-table .t5-score { font-weight: bold; }
.top5-table .t5-date  { color: var(--parch-soft); font-size: 0.85em; }
.top5-table .t5-opp   { color: var(--parch-soft); font-size: 0.85em; }

/* ── Confirm overlay ─────────────────────── */
#confirmOverlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
#confirmOverlay.show { display: flex; }
#confirmBox {
    background: var(--navy-mid);
    border: 1px solid var(--gold);
    border-radius: 6px;
    padding: 20px;
    max-width: 320px;
    width: 100%;
    text-align: center;
}
#confirmBox h3 { color: var(--gold); margin-bottom: 8px; font-size: 1em; letter-spacing: 0.06em; }
#confirmBox p  { color: var(--parch-soft); font-size: 0.85em; margin-bottom: 14px; }
.confirm-btns { display: flex; gap: 8px; }
.confirm-btns button {
    flex: 1; padding: 9px; font-family: inherit; font-size: 0.85em;
    border-radius: 4px; cursor: pointer; letter-spacing: 0.04em;
}
#confirmOK {
    background: linear-gradient(180deg, var(--burg) 0%, var(--burg-deep) 100%);
    border: 1px solid var(--gold-dim);
    color: var(--parch);
}
#confirmCancel {
    background: rgba(200,168,75,0.1);
    border: 1px solid var(--gold-dim);
    color: var(--parch-soft);
}

/* Toast */
#toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--navy-mid);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 0.82em;
    letter-spacing: 0.06em;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <header>
    <h1>🎲 POCKETS</h1>
    <p>Score Sheet</p>
  </header>

  <div id="tabBar">
    <button class="tab-btn active" onclick="showTab('sheet')">Score Sheet</button>
    <button class="tab-btn" onclick="showTab('history')">History</button>
    <button class="tab-btn" onclick="showTab('records')">Records</button>
  </div>

  <!-- ── SCORE SHEET ───────────────────── -->
  <div id="sheetPanel" class="panel active">

    <div id="playerBar">
      <div class="name-block" id="p1block">
        <input class="name-input" id="p1name" type="text" value="Blue Player"
               autocomplete="off" autocorrect="off" spellcheck="false"
               oninput="onNameChange()">
        <div class="running-total" id="p1total">0</div>
      </div>
      <div class="vs-label">VS</div>
      <div class="name-block" id="p2block">
        <input class="name-input" id="p2name" type="text" value="Red Player"
               autocomplete="off" autocorrect="off" spellcheck="false"
               oninput="onNameChange()">
        <div class="running-total" id="p2total">0</div>
      </div>
    </div>

    <div id="triggerNote">⚠ 100 reached — next round is the Rolldown! Mark it 🎲</div>

    <table id="roundTable">
      <thead>
        <tr>
          <th style="width:32px">#</th>
          <th id="th1">Blue Player</th>
          <th id="th2">Red Player</th>
          <th style="width:34px" title="Mark as Rolldown round">🎲</th>
        </tr>
      </thead>
      <tbody id="roundBody"></tbody>
      <tfoot>
        <tr id="totalsRow">
          <td>Total</td>
          <td id="p1totalFoot">0</td>
          <td id="p2totalFoot">0</td>
          <td></td>
        </tr>
      </tfoot>
    </table>

    <div id="winnerBanner">
      <div class="wname" id="winnerName">— WINS!</div>
      <div class="wmargin" id="winnerMargin"></div>
    </div>

    <div id="sheetActions">
      <button class="action-btn btn-add-round" onclick="addRound()">+ Round</button>
      <button class="action-btn btn-save" id="saveBtn" onclick="confirmSave()">Save Game</button>
      <button class="action-btn btn-clear" onclick="confirmClear()">New Game</button>
    </div>
  </div>

  <!-- ── HISTORY ───────────────────────── -->
  <div id="historyPanel" class="panel">
    <div class="win-counts">
      <div class="win-block" id="p1wins">
        <div class="win-label">Wins</div>
        <div class="win-name" id="p1winsName">Blue Player</div>
        <div class="win-count" id="p1winsCount">0</div>
      </div>
      <div class="win-block" id="p2wins">
        <div class="win-label">Wins</div>
        <div class="win-name" id="p2winsName">Red Player</div>
        <div class="win-count" id="p2winsCount">0</div>
      </div>
    </div>
    <div id="historyList"></div>
    <button id="clearHistory" onclick="confirmClearHistory()">Clear All History</button>
  </div>

  <!-- ── RECORDS ───────────────────────── -->
  <div id="recordsPanel" class="panel">
    <div id="recordsContent"></div>
  </div>

</div><!-- #app -->

<!-- Confirm overlay -->
<div id="confirmOverlay">
  <div id="confirmBox">
    <h3 id="confirmTitle">Are you sure?</h3>
    <p id="confirmMsg"></p>
    <div class="confirm-btns">
      <button id="confirmOK">Yes</button>
      <button id="confirmCancel" onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Storage ───────────────────────────────
var STORE_KEY = 'pockets-score-v1';

function loadData() {
    try {
        var raw = localStorage.getItem(STORE_KEY);
        return raw ? JSON.parse(raw) : defaultData();
    } catch(e) { return defaultData(); }
}
function saveData(data) {
    localStorage.setItem(STORE_KEY, JSON.stringify(data));
}
function defaultData() {
    return { p1name: 'Blue Player', p2name: 'Red Player', games: [] };
}

var db = loadData();

// ── Current game state ────────────────────
var rounds = []; // [{p1: null, p2: null, rolldown: false}]

// ── Init ──────────────────────────────────
function init() {
    document.getElementById('p1name').value = db.p1name || 'Blue Player';
    document.getElementById('p2name').value = db.p2name || 'Red Player';
    updateNameHeaders();
    addRound();
    renderHistory();
    renderRecords();
}

// ── Name handling ─────────────────────────
function onNameChange() {
    db.p1name = document.getElementById('p1name').value || 'Blue Player';
    db.p2name = document.getElementById('p2name').value || 'Red Player';
    saveData(db);
    updateNameHeaders();
}
function updateNameHeaders() {
    var n1 = db.p1name || 'Blue Player';
    var n2 = db.p2name || 'Red Player';
    document.getElementById('th1').textContent = n1;
    document.getElementById('th2').textContent = n2;
    document.getElementById('p1winsName').textContent = n1;
    document.getElementById('p2winsName').textContent = n2;
}

// ── Round management ──────────────────────
function addRound() {
    rounds.push({ p1: null, p2: null, rolldown: false });
    renderRounds();
    // Focus the first empty p1 input
    setTimeout(function() {
        var inputs = document.querySelectorAll('.p1-input');
        for (var i = 0; i < inputs.length; i++) {
            if (!inputs[i].value) { inputs[i].focus(); break; }
        }
    }, 50);
}

function renderRounds() {
    var tbody = document.getElementById('roundBody');
    tbody.innerHTML = '';
    for (var i = 0; i < rounds.length; i++) {
        var r = rounds[i];
        var tr = document.createElement('tr');
        if (r.rolldown) { tr.className = 'rolldown-row'; }
        tr.dataset.idx = i;

        // Round number
        var tdNum = document.createElement('td');
        tdNum.className = 'rnd-num';
        tdNum.textContent = i + 1;
        tr.appendChild(tdNum);

        // P1 score
        var td1 = document.createElement('td');
        var inp1 = document.createElement('input');
        inp1.type = 'text';
        inp1.inputMode = 'numeric';
        inp1.pattern = '[0-9]*';
        inp1.className = 'score-input p1-input';
        inp1.value = r.p1 !== null ? r.p1 : '';
        inp1.dataset.idx = i;
        inp1.dataset.player = '1';
        inp1.setAttribute('autocomplete', 'off');
        inp1.addEventListener('input', onScoreInput);
        inp1.addEventListener('focus', function() { this.select(); });
        td1.appendChild(inp1);
        tr.appendChild(td1);

        // P2 score
        var td2 = document.createElement('td');
        var inp2 = document.createElement('input');
        inp2.type = 'text';
        inp2.inputMode = 'numeric';
        inp2.pattern = '[0-9]*';
        inp2.className = 'score-input p2-input';
        inp2.value = r.p2 !== null ? r.p2 : '';
        inp2.dataset.idx = i;
        inp2.dataset.player = '2';
        inp2.setAttribute('autocomplete', 'off');
        inp2.addEventListener('input', onScoreInput);
        inp2.addEventListener('focus', function() { this.select(); });
        td2.appendChild(inp2);
        tr.appendChild(td2);

        // Rolldown toggle
        var tdRD = document.createElement('td');
        tdRD.className = 'rd-toggle';
        var rdBtn = document.createElement('button');
        rdBtn.className = 'rd-btn' + (r.rolldown ? ' active' : '');
        rdBtn.textContent = '🎲';
        rdBtn.title = 'Mark as Rolldown round';
        rdBtn.dataset.idx = i;
        rdBtn.addEventListener('click', function() {
            var idx = parseInt(this.dataset.idx);
            rounds[idx].rolldown = !rounds[idx].rolldown;
            renderRounds();
            updateTotals();
        });
        tdRD.appendChild(rdBtn);
        tr.appendChild(tdRD);

        tbody.appendChild(tr);
    }
    updateTotals();
}

function onScoreInput(e) {
    var idx = parseInt(e.target.dataset.idx);
    var player = e.target.dataset.player;
    var val = e.target.value.replace(/[^0-9]/g, '');
    e.target.value = val;
    rounds[idx][player === '1' ? 'p1' : 'p2'] = val === '' ? null : parseInt(val);
    updateTotals();
}

function updateTotals() {
    var t1 = 0, t2 = 0;
    for (var i = 0; i < rounds.length; i++) {
        if (rounds[i].p1 !== null) t1 += rounds[i].p1;
        if (rounds[i].p2 !== null) t2 += rounds[i].p2;
    }
    document.getElementById('p1total').textContent = t1;
    document.getElementById('p2total').textContent = t2;
    document.getElementById('p1totalFoot').textContent = t1;
    document.getElementById('p2totalFoot').textContent = t2;

    // 100-point trigger note
    var prev1 = 0, prev2 = 0;
    var triggered = false;
    for (var i = 0; i < rounds.length - 1; i++) {
        if (rounds[i].p1 !== null) prev1 += rounds[i].p1;
        if (rounds[i].p2 !== null) prev2 += rounds[i].p2;
        if (prev1 >= 100 || prev2 >= 100) { triggered = true; }
    }
    document.getElementById('triggerNote').style.display = triggered ? 'block' : 'none';

    // Winner detection — look for a rolldown round with both scores
    var winner = null, winnerMargin = 0;
    var hasRolldown = rounds.some(function(r) { return r.rolldown && r.p1 !== null && r.p2 !== null; });
    if (hasRolldown) {
        var margin = Math.abs(t1 - t2);
        var n1 = db.p1name || 'Blue Player';
        var n2 = db.p2name || 'Red Player';
        if (t1 > t2) { winner = n1; winnerMargin = margin; }
        else if (t2 > t1) { winner = n2; winnerMargin = margin; }
        else { winner = 'Tie!'; winnerMargin = 0; }
    }

    var banner = document.getElementById('winnerBanner');
    if (winner) {
        document.getElementById('winnerName').textContent = winner + (winner === 'Tie!' ? '' : ' Wins!');
        document.getElementById('winnerMargin').textContent = winnerMargin > 0
            ? 'By ' + winnerMargin + ' point' + (winnerMargin === 1 ? '' : 's')
            : 'Dead heat!';
        banner.style.display = 'block';
    } else {
        banner.style.display = 'none';
    }
}

// ── Save / Clear ──────────────────────────
function confirmSave() {
    var hasData = rounds.some(function(r) { return r.p1 !== null || r.p2 !== null; });
    if (!hasData) { showToast('Nothing to save yet.'); return; }
    showConfirm('Save this game?', 'It will be added to your history.',
        function() { saveGame(); });
}

function saveGame() {
    var t1 = 0, t2 = 0;
    var validRounds = [];
    for (var i = 0; i < rounds.length; i++) {
        var r = rounds[i];
        if (r.p1 !== null || r.p2 !== null) {
            var p1 = r.p1 || 0, p2 = r.p2 || 0;
            t1 += p1; t2 += p2;
            validRounds.push({ p1: p1, p2: p2, rolldown: r.rolldown });
        }
    }
    var n1 = db.p1name || 'Blue Player';
    var n2 = db.p2name || 'Red Player';
    var winner = t1 > t2 ? 'p1' : t2 > t1 ? 'p2' : 'tie';
    var game = {
        date: new Date().toISOString(),
        p1: n1, p2: n2,
        p1total: t1, p2total: t2,
        winner: winner,
        rounds: validRounds
    };
    if (!db.games) db.games = [];
    db.games.unshift(game);
    saveData(db);
    clearSheet();
    renderHistory();
    renderRecords();
    showToast('Game saved!');
}

function confirmClear() {
    var hasData = rounds.some(function(r) { return r.p1 !== null || r.p2 !== null; });
    if (!hasData) { clearSheet(); return; }
    showConfirm('Start a new game?', 'Current scores will be lost.',
        function() { clearSheet(); });
}

function clearSheet() {
    rounds = [];
    document.getElementById('winnerBanner').style.display = 'none';
    document.getElementById('triggerNote').style.display = 'none';
    addRound();
}

// ── History rendering ─────────────────────
function renderHistory() {
    var games = db.games || [];
    var n1 = db.p1name || 'Blue Player';
    var n2 = db.p2name || 'Red Player';

    // Win counts
    var w1 = 0, w2 = 0;
    games.forEach(function(g) {
        if (g.winner === 'p1') w1++;
        else if (g.winner === 'p2') w2++;
    });
    document.getElementById('p1winsCount').textContent = w1;
    document.getElementById('p2winsCount').textContent = w2;

    var list = document.getElementById('historyList');
    if (games.length === 0) {
        list.innerHTML = '<p class="history-empty">No games recorded yet.<br>Play a game and save it!</p>';
        return;
    }

    list.innerHTML = '';
    games.forEach(function(g, i) {
        var card = document.createElement('div');
        card.className = 'game-card' + (g.winner === 'p1' ? ' winner-p1' : g.winner === 'p2' ? ' winner-p2' : '');

        var dt = new Date(g.date);
        var dateStr = dt.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', year:'2-digit'});
        var timeStr = dt.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});

        var winLabel = g.winner === 'p1' ? (g.p1 + ' ' + g.p1) : g.winner === 'p2' ? (g.p2) : 'Tie';
        var winnerName = g.winner === 'p1' ? g.p1 : g.winner === 'p2' ? g.p2 : 'Tie';
        var margin = Math.abs(g.p1total - g.p2total);

        card.innerHTML =
            '<div class="game-meta">' +
                '<span class="game-date">' + dateStr + ' · ' + timeStr + '</span>' +
                '<span class="game-num">Game #' + (games.length - i) + '</span>' +
            '</div>' +
            '<div class="game-scores">' +
                '<div class="gs-p1">' + g.p1 + '<br><span class="score-val">' + g.p1total + '</span></div>' +
                '<div>' +
                    '<div class="gs-winner">' + winnerName + ' wins</div>' +
                    '<div class="gs-divider">by ' + margin + '</div>' +
                '</div>' +
                '<div class="gs-p2">' + g.p2 + '<br><span class="score-val">' + g.p2total + '</span></div>' +
            '</div>' +
            '<div class="game-rounds">' + g.rounds.length + ' rounds' +
                (g.rounds.some(function(r){return r.rolldown;}) ? ' · Rolldown played' : '') +
            '</div>';
        list.appendChild(card);
    });
}

// ── Records rendering ─────────────────────
function renderRecords() {
    var games = db.games || [];
    var content = document.getElementById('recordsContent');

    if (games.length === 0) {
        content.innerHTML = '<p class="records-empty">Records will appear here<br>after you save some games.</p>';
        return;
    }

    var n1 = db.p1name || 'Blue Player';
    var n2 = db.p2name || 'Red Player';

    var w1 = 0, w2 = 0, sum1 = 0, sum2 = 0, top1 = [], top2 = [];
    games.forEach(function(g) {
        if (g.winner === 'p1') w1++;
        if (g.winner === 'p2') w2++;
        sum1 += g.p1total;
        sum2 += g.p2total;
        top1.push({score: g.p1total, opp: g.p2total, date: g.date, p: g.p1});
        top2.push({score: g.p2total, opp: g.p1total, date: g.date, p: g.p2});
    });
    top1.sort(function(a,b){return b.score-a.score;});
    top2.sort(function(a,b){return b.score-a.score;});
    top1 = top1.slice(0,5);
    top2 = top2.slice(0,5);

    function fmtDate(iso) {
        var d = new Date(iso);
        return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'2-digit'});
    }
    function top5rows(list) {
        return list.map(function(g, i) {
            return '<tr>' +
                '<td class="t5-rank">' + (i+1) + '</td>' +
                '<td class="t5-score">' + g.score + '</td>' +
                '<td class="t5-opp">vs ' + g.opp + '</td>' +
                '<td class="t5-date">' + fmtDate(g.date) + '</td>' +
                '</tr>';
        }).join('');
    }

    content.innerHTML =
        '<div class="records-section">' +
            '<div class="records-title">Overall</div>' +
            '<div class="stat-grid">' +
                '<div class="stat-box"><div class="stat-val">' + games.length + '</div><div class="stat-lbl">Games Played</div></div>' +
                '<div class="stat-box"><div class="stat-val">' + (w1 > w2 ? n1 : w2 > w1 ? n2 : 'Even') + '</div><div class="stat-lbl">Series Leader</div></div>' +
            '</div>' +
        '</div>' +
        '<div class="records-section">' +
            '<div class="records-title" style="color:#7ab0ee">' + n1 + '</div>' +
            '<div class="stat-grid" style="margin-bottom:8px">' +
                '<div class="stat-box"><div class="stat-val" style="color:#7ab0ee">' + w1 + '</div><div class="stat-lbl">Wins</div></div>' +
                '<div class="stat-box"><div class="stat-val" style="color:#7ab0ee">' + (games.length > 0 ? Math.round(sum1/games.length) : 0) + '</div><div class="stat-lbl">Avg Score</div></div>' +
            '</div>' +
            '<table class="top5-table"><thead><tr><th>#</th><th>Score</th><th>Opponent</th><th>Date</th></tr></thead>' +
            '<tbody>' + top5rows(top1) + '</tbody></table>' +
        '</div>' +
        '<div class="records-section">' +
            '<div class="records-title" style="color:#e07878">' + n2 + '</div>' +
            '<div class="stat-grid" style="margin-bottom:8px">' +
                '<div class="stat-box"><div class="stat-val" style="color:#e07878">' + w2 + '</div><div class="stat-lbl">Wins</div></div>' +
                '<div class="stat-box"><div class="stat-val" style="color:#e07878">' + (games.length > 0 ? Math.round(sum2/games.length) : 0) + '</div><div class="stat-lbl">Avg Score</div></div>' +
            '</div>' +
            '<table class="top5-table"><thead><tr><th>#</th><th>Score</th><th>Opponent</th><th>Date</th></tr></thead>' +
            '<tbody>' + top5rows(top2) + '</tbody></table>' +
        '</div>';
}

// ── Tab switching ─────────────────────────
function showTab(tab) {
    document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById(tab + 'Panel').classList.add('active');
    event.target.classList.add('active');
    if (tab === 'history') { renderHistory(); }
    if (tab === 'records') { renderRecords(); }
}

// ── Confirm dialog ────────────────────────
var confirmCallback = null;
function showConfirm(title, msg, cb) {
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').textContent = msg;
    confirmCallback = cb;
    document.getElementById('confirmOverlay').classList.add('show');
    document.getElementById('confirmOK').onclick = function() {
        closeConfirm();
        if (confirmCallback) { confirmCallback(); }
    };
}
function closeConfirm() {
    document.getElementById('confirmOverlay').classList.remove('show');
    confirmCallback = null;
}

// ── History clear ─────────────────────────
function confirmClearHistory() {
    showConfirm('Clear all history?', 'This cannot be undone.', function() {
        db.games = [];
        saveData(db);
        renderHistory();
        renderRecords();
        showToast('History cleared.');
    });
}

// ── Toast ─────────────────────────────────
function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2200);
}

// ── Boot ──────────────────────────────────
init();
</script>
