<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>POCKETS Score Sheet</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: Georgia, serif;
    background: #1a3020;
    color: #f5f0e4;
    font-size: 16px;
    min-height: 100vh;
}
#app {
    max-width: 560px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #1a2744;
}
header {
    text-align: center;
    padding: 10px 12px 6px;
    background: #243258;
    border-bottom: 1px solid rgba(200,168,75,0.3);
}
header h1 { font-size: 1.3em; color: #c8a84b; font-weight: normal; letter-spacing: 0.14em; }
header p  { font-size: 0.7em; color: #c8b88a; letter-spacing: 0.08em; }

/* Tabs */
#tabs { display: flex; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(200,168,75,0.2); }
#tabs button {
    flex: 1; padding: 8px 4px;
    background: none; border: none; border-bottom: 2px solid transparent;
    color: #c8b88a; font-family: inherit; font-size: 0.75em;
    letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
}
#tabs button.on { color: #c8a84b; border-bottom-color: #c8a84b; }

.panel { display: none; flex-direction: column; flex: 1; overflow-y: auto; }
.panel.on { display: flex; }

/* ── SCORE SHEET ── */
#nameRow {
    display: grid; grid-template-columns: 1fr 30px 1fr;
    align-items: center; gap: 6px;
    padding: 8px 10px;
    background: rgba(0,0,0,0.15);
    border-bottom: 1px solid rgba(200,168,75,0.2);
}
.name-col { display: flex; flex-direction: column; align-items: center; }
.name-input {
    width: 100%; background: transparent; border: none;
    border-bottom: 1px solid rgba(200,168,75,0.3);
    color: inherit; font-family: inherit; font-size: 0.95em;
    font-weight: bold; text-align: center; padding: 2px 4px; outline: none;
}
.name-input:focus { border-bottom-color: #c8a84b; }
#n1 .name-input { color: #90c0ff; }
#n2 .name-input { color: #ff9090; }
.vs { color: rgba(200,168,75,0.4); font-size: 0.8em; text-align: center; }

table { width: 100%; border-collapse: collapse; }
thead th {
    padding: 7px 4px; font-weight: normal; font-size: 0.74em;
    letter-spacing: 0.07em; text-transform: uppercase;
    border-bottom: 1px solid rgba(200,168,75,0.25);
    position: sticky; top: 0; z-index: 2; background: #243258; color: #c8a84b;
}
thead th:nth-child(2) { background: #1e3060; color: #90c0ff; }
thead th:nth-child(3) { background: #501818; color: #ff9090; }

tbody tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
td { padding: 2px 3px; text-align: center; vertical-align: middle; }
.rn { width: 48px; font-size: 1em; font-weight: bold; color: #c8b88a; background: rgba(0,0,0,0.12); }
.rn.rd { color: #c8a84b; font-style: italic; font-size: 0.82em; }
.p1c { background: rgba(30,48,96,0.55); }
.p2c { background: rgba(80,24,24,0.55); }

.score-input {
    width: 100%; background: transparent; border: none;
    border-bottom: 1px solid rgba(200,168,75,0.15);
    color: #f5f0e4; font-family: inherit; font-size: 1.1em;
    text-align: center; padding: 8px 2px; outline: none;
    min-height: 42px; -webkit-appearance: none;
}
.score-input:focus { background: rgba(255,255,255,0.07); border-bottom-color: #c8a84b; }
.p1c .score-input { color: #b0d0ff; }
.p2c .score-input { color: #ffb0b0; }

tfoot td {
    padding: 10px 4px; border-top: 2px solid rgba(200,168,75,0.4);
    font-size: 0.72em; letter-spacing: 0.05em; text-transform: uppercase;
    font-weight: bold; color: #c8a84b;
}
tfoot td:nth-child(1) { background: rgba(0,0,0,0.2); }
tfoot td:nth-child(2) { background: rgba(25,50,105,0.9); }
tfoot td:nth-child(3) { background: rgba(80,22,22,0.9); }
.tval { font-size: 2.4em; display: block; line-height: 1; margin-top: 2px; color: #c8a84b; }

#announce {
    display: none; text-align: center; padding: 10px 10px 4px;
    font-size: 1em; font-weight: bold; letter-spacing: 0.08em;
}
#winner-banner {
    display: none; text-align: center;
    padding: 14px 10px;
    background: rgba(200,168,75,0.08);
    border-top: 1px solid rgba(200,168,75,0.25);
}
#winner-banner .wn {
    font-size: 1.5em; color: #c8a84b; letter-spacing: 0.1em;
    animation: glo 2s ease-in-out infinite;
}
#winner-banner .wm { font-size: 0.8em; color: #c8b88a; margin-top: 3px; }
@keyframes glo { 0%,100%{text-shadow:0 0 8px rgba(200,168,75,0.4)} 50%{text-shadow:0 0 22px rgba(200,168,75,0.9)} }

#btns {
    display: flex; gap: 8px; padding: 10px;
    background: rgba(0,0,0,0.15);
    border-top: 1px solid rgba(200,168,75,0.2);
    margin-top: auto;
}
#btns button {
    flex: 1; padding: 12px 6px; font-family: inherit;
    font-size: 0.82em; letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; border-radius: 4px; border: 1px solid rgba(200,168,75,0.3);
}
#btn-save { background: linear-gradient(180deg,#6e3030,#4d2020); color: #f5f0e4; }
#btn-new  { background: rgba(200,168,75,0.1); color: #c8b88a; }

/* ── HISTORY ── */
#wincounts { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid rgba(200,168,75,0.2); }
.wc { padding: 10px; text-align: center; }
.wc:first-child { border-right: 1px solid rgba(200,168,75,0.2); }
.wc-lbl { font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.08em; color: #c8b88a; }
.wc-name { font-size: 0.9em; font-weight: bold; margin: 2px 0; }
.wc-n { font-size: 1.8em; font-weight: bold; color: #c8a84b; line-height: 1; }
#wc1 .wc-name { color: #90c0ff; }
#wc2 .wc-name { color: #ff9090; }

.game-card { padding: 10px 12px; border-bottom: 1px solid rgba(200,168,75,0.08); border-left: 3px solid transparent; }
.game-card.gw1 { border-left-color: #90c0ff; }
.game-card.gw2 { border-left-color: #ff9090; }
.gc-top { display: flex; justify-content: space-between; font-size: 0.7em; color: #c8b88a; margin-bottom: 5px; }
.gc-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 4px; }
.gc-p1 { color: #90c0ff; }
.gc-p2 { color: #ff9090; text-align: right; }
.gc-sc { font-size: 1.5em; font-weight: bold; display: block; line-height: 1; }
.gc-mid { text-align: center; font-size: 0.72em; color: #c8b88a; }
.gc-wl { color: #c8a84b; display: block; }
.empty { text-align: center; padding: 30px; color: #c8b88a; font-style: italic; font-size: 0.85em; }
#btn-clr { margin: 10px; padding: 9px; width: calc(100% - 20px); background: rgba(110,48,48,0.25); border: 1px solid rgba(110,48,48,0.5); color: #c8b88a; font-family: inherit; font-size: 0.78em; letter-spacing: 0.05em; cursor: pointer; border-radius: 4px; }

/* ── RECORDS ── */
.rsec { padding: 10px 12px; border-bottom: 1px solid rgba(200,168,75,0.2); }
.rtitle { font-size: 0.74em; text-transform: uppercase; letter-spacing: 0.1em; color: #c8a84b; margin-bottom: 8px; }
.sg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.sbox { background: rgba(255,255,255,0.04); border: 1px solid rgba(200,168,75,0.25); border-radius: 4px; padding: 8px; text-align: center; }
.sbox .sv { font-size: 1.5em; font-weight: bold; color: #c8a84b; line-height: 1; }
.sbox .sl { font-size: 0.65em; text-transform: uppercase; letter-spacing: 0.06em; color: #c8b88a; margin-top: 2px; }
.t5 { width: 100%; border-collapse: collapse; font-size: 0.82em; }
.t5 th { text-align: left; padding: 4px 5px; color: rgba(200,168,75,0.5); font-weight: normal; font-size: 0.85em; border-bottom: 1px solid rgba(200,168,75,0.2); }
.t5 td { padding: 5px 5px; border-bottom: 1px solid rgba(255,255,255,0.04); color: #f5f0e4; }
.t5 tr:first-child td { color: #c8a84b; }
.t5 .rk { color: rgba(200,168,75,0.4); width: 20px; text-align: center; }
.t5 .sc { font-weight: bold; }
.t5 .dt { color: #c8b88a; font-size: 0.88em; }

/* Confirm modal */
#modal {
    display: none; position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8); z-index: 9999;
    align-items: center; justify-content: center; padding: 20px;
}
#modal.on { display: flex; }
#mbox {
    background: #243258; border: 2px solid #c8a84b;
    border-radius: 8px; padding: 24px 20px;
    max-width: 300px; width: 100%; text-align: center;
}
#mbox p { color: #f5f0e4; font-size: 1em; line-height: 1.5; margin-bottom: 20px; }
#mbox .mbts { display: flex; gap: 10px; }
#mbox button {
    flex: 1; padding: 14px 8px; font-family: inherit;
    font-size: 1em; border-radius: 6px; cursor: pointer;
    border: 1px solid rgba(200,168,75,0.3); min-height: 50px;
}
#m-yes { background: linear-gradient(180deg,#6e3030,#4d2020); color: #f5f0e4; }
#m-no  { background: rgba(200,168,75,0.1); color: #c8b88a; }

/* Toast */
#toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #243258; border: 1px solid #c8a84b;
    color: #c8a84b; padding: 8px 18px; border-radius: 20px;
    font-size: 0.82em; letter-spacing: 0.06em;
    opacity: 0; transition: all 0.28s; z-index: 1000;
    pointer-events: none; white-space: nowrap;
}
#toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <header>
    <h1>🎲 POCKETS</h1>
    <p>Score Sheet</p>
  </header>

  <div id="tabs">
    <button id="t-sheet" class="on">Score Sheet</button>
    <button id="t-hist">History</button>
    <button id="t-rec">Records</button>
  </div>

  <!-- SCORE SHEET -->
  <div id="p-sheet" class="panel on">
    <div id="nameRow">
      <div class="name-col" id="n1">
        <input class="name-input" id="p1name" type="text" value="Blue Player"
               autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
      <div class="vs">VS</div>
      <div class="name-col" id="n2">
        <input class="name-input" id="p2name" type="text" value="Red Player"
               autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width:48px">#</th>
          <th id="h1">Blue Player</th>
          <th id="h2">Red Player</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
      <tfoot>
        <tr>
          <td style="font-size:0.7em;color:#c8b88a">TOTAL</td>
          <td><span class="tval" id="t1">0</span></td>
          <td><span class="tval" id="t2">0</span></td>
        </tr>
      </tfoot>
    </table>

    <div id="announce"></div>

    <div id="winner-banner">
      <div class="wn" id="wn"></div>
      <div class="wm" id="wm"></div>
    </div>

    <div id="btns">
      <button id="btn-save">Save Game</button>
      <button id="btn-new">New Game</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="p-hist" class="panel">
    <div id="wincounts">
      <div class="wc" id="wc1">
        <div class="wc-lbl">Wins</div>
        <div class="wc-name" id="wn1">Blue Player</div>
        <div class="wc-n" id="wc1n">0</div>
      </div>
      <div class="wc" id="wc2">
        <div class="wc-lbl">Wins</div>
        <div class="wc-name" id="wn2">Red Player</div>
        <div class="wc-n" id="wc2n">0</div>
      </div>
    </div>
    <div id="hist-list"></div>
    <button id="btn-clr">Clear All History</button>
  </div>

  <!-- RECORDS -->
  <div id="p-rec" class="panel">
    <div id="rec-content"></div>
  </div>

</div>

<div id="modal">
  <div id="mbox">
    <p id="m-msg"></p>
    <div class="mbts">
      <button id="m-yes">Yes</button>
      <button id="m-no">Cancel</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ── Storage ───────────────────────────────────────────────────────────
var KEY  = 'pockets-v1';
var CKEY = 'pockets-v1-cur';
var db   = {p1:'Blue Player', p2:'Red Player', games:[]};
var rounds = [{p1:null, p2:null}];
var pendingCb = null;

function loadDB() {
    try { var d = JSON.parse(localStorage.getItem(KEY)); if (d) db = d; } catch(e){}
}
function saveDB() {
    try { localStorage.setItem(KEY, JSON.stringify(db)); } catch(e){}
}
function saveCur() {
    try { localStorage.setItem(CKEY, JSON.stringify(rounds)); } catch(e){}
}
function loadCur() {
    try { var d = JSON.parse(localStorage.getItem(CKEY)); if (d && d.length) return d; } catch(e){}
    return null;
}
function clearCur() {
    try { localStorage.removeItem(CKEY); } catch(e){}
}

// ── Confirm modal ─────────────────────────────────────────────────────
function ask(msg, cb) {
    document.getElementById('m-msg').textContent = msg;
    pendingCb = cb;
    document.getElementById('modal').classList.add('on');
}
document.getElementById('m-yes').addEventListener('click', function() {
    document.getElementById('modal').classList.remove('on');
    var cb = pendingCb; pendingCb = null;
    if (cb) cb();
});
document.getElementById('m-no').addEventListener('click', function() {
    document.getElementById('modal').classList.remove('on');
    pendingCb = null;
});

// ── Toast ─────────────────────────────────────────────────────────────
function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('on');
    setTimeout(function(){ t.classList.remove('on'); }, 2200);
}

// ── Tabs ─────────────────────────────────────────────────────────────
function showTab(panel, btn) {
    ['p-sheet','p-hist','p-rec'].forEach(function(id){
        document.getElementById(id).classList.remove('on');
    });
    ['t-sheet','t-hist','t-rec'].forEach(function(id){
        document.getElementById(id).classList.remove('on');
    });
    document.getElementById(panel).classList.add('on');
    document.getElementById(btn).classList.add('on');
    if (panel === 'p-hist') renderHistory();
    if (panel === 'p-rec')  renderRecords();
}
document.getElementById('t-sheet').addEventListener('click', function(){ showTab('p-sheet','t-sheet'); });
document.getElementById('t-hist') .addEventListener('click', function(){ showTab('p-hist', 't-hist');  });
document.getElementById('t-rec')  .addEventListener('click', function(){ showTab('p-rec',  't-rec');   });

// ── Names ─────────────────────────────────────────────────────────────
function syncNames() {
    var n1 = document.getElementById('p1name').value.trim() || 'Blue Player';
    var n2 = document.getElementById('p2name').value.trim() || 'Red Player';
    db.p1 = n1; db.p2 = n2; saveDB();
    document.getElementById('h1').textContent = n1;
    document.getElementById('h2').textContent = n2;
    document.getElementById('wn1').textContent = n1;
    document.getElementById('wn2').textContent = n2;
}
document.getElementById('p1name').addEventListener('input', syncNames);
document.getElementById('p2name').addEventListener('input', syncNames);
document.getElementById('p1name').addEventListener('blur', function(){
    if (!this.value.trim()) { this.value = 'Blue Player'; syncNames(); }
});
document.getElementById('p2name').addEventListener('blur', function(){
    if (!this.value.trim()) { this.value = 'Red Player'; syncNames(); }
});

// ── Rolldown detection ────────────────────────────────────────────────
function getRDIdx() {
    var r1=0, r2=0;
    for (var i=0; i<rounds.length; i++) {
        if (rounds[i].p1 !== null && rounds[i].p2 !== null) {
            r1 += rounds[i].p1; r2 += rounds[i].p2;
            if (r1 >= 100 || r2 >= 100) return i + 1;
        }
    }
    return -1;
}

// ── Render sheet ──────────────────────────────────────────────────────
function renderSheet() {
    var tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    var rdIdx = getRDIdx();
    for (var i = 0; i < rounds.length; i++) {
        var isRD = (i === rdIdx);
        var tr   = document.createElement('tr');
        // Round number cell
        var tn = document.createElement('td');
        tn.className = 'rn' + (isRD ? ' rd' : '');
        tn.textContent = isRD ? 'RD' : (i + 1);
        tr.appendChild(tn);
        // Score cells
        tr.appendChild(makeCell(i, 'p1', 'p1c', isRD));
        tr.appendChild(makeCell(i, 'p2', 'p2c', isRD));
        tbody.appendChild(tr);
    }
    updateTotals();
}

function makeCell(idx, player, cls, isRD) {
    var td  = document.createElement('td');
    td.className = cls;
    var inp = document.createElement('input');
    inp.type        = 'text';
    inp.inputMode   = 'numeric';
    inp.pattern     = '[0-9]*';
    inp.autocomplete = 'off';
    inp.className   = 'score-input';
    inp.value       = rounds[idx][player] !== null ? rounds[idx][player] : '';
    inp.addEventListener('input', function() {
        var v = this.value.replace(/[^0-9]/g, '');
        var cap = isRD ? 40 : 21;
        if (v !== '' && parseInt(v) > cap) v = String(cap);
        this.value = v;
        rounds[idx][player] = v === '' ? null : parseInt(v);
        saveCur();
        var prev = getRDIdx();
        updateTotals();
        if (getRDIdx() !== prev) renderSheet();
    });
    inp.addEventListener('blur', function() {
        // Enforce minimum on leave
        var v = this.value;
        if (v !== '') {
            var fl = isRD ? 15 : 2;
            if (parseInt(v) < fl) {
                this.value = String(fl);
                rounds[idx][player] = fl;
                saveCur();
                updateTotals();
            }
        }
        // Auto-add next row when last row is complete
        if (idx === rounds.length - 1 && !isRD &&
            rounds[idx].p1 !== null && rounds[idx].p2 !== null) {
            rounds.push({p1:null, p2:null});
            renderSheet();
            setTimeout(function(){
                var ins = document.querySelectorAll('.p1c input');
                if (ins.length) ins[ins.length-1].focus();
            }, 40);
        }
    });
    inp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.keyCode === 13) {
            e.preventDefault();
            var all  = Array.from(document.querySelectorAll('.score-input'));
            var next = all[all.indexOf(this) + 1];
            if (next) next.focus(); else this.blur();
        }
    });
    inp.addEventListener('focus', function(){ this.select(); });
    td.appendChild(inp);
    return td;
}

function updateTotals() {
    var t1=0, t2=0;
    rounds.forEach(function(r){
        if (r.p1 !== null) t1 += r.p1;
        if (r.p2 !== null) t2 += r.p2;
    });
    document.getElementById('t1').textContent = t1;
    document.getElementById('t2').textContent = t2;

    // Announce
    var ann = document.getElementById('announce');
    var rdIdx = getRDIdx();
    var rdDone = rdIdx >= 0 && rounds[rdIdx] &&
                 rounds[rdIdx].p1 !== null && rounds[rdIdx].p2 !== null;
    var n1 = db.p1, n2 = db.p2, mg = Math.abs(t1-t2);
    if (t1 === 0 && t2 === 0) {
        ann.style.display = 'none';
    } else if (rdDone) {
        ann.style.display = 'block';
        if (t1 > t2) { ann.style.color='#90c0ff'; ann.textContent = n1+' Wins by '+mg+'!'; }
        else if (t2 > t1) { ann.style.color='#ff9090'; ann.textContent = n2+' Wins by '+mg+'!'; }
        else { ann.style.color='#c8a84b'; ann.textContent = "It's a Tie!"; }
    } else if (t1 > 0 || t2 > 0) {
        ann.style.display = 'block';
        if (t1 > t2) { ann.style.color='#90c0ff'; ann.textContent = n1+' leads by '+mg; }
        else if (t2 > t1) { ann.style.color='#ff9090'; ann.textContent = n2+' leads by '+mg; }
        else { ann.style.color='#c8a84b'; ann.textContent = 'Tied at '+t1; }
    } else {
        ann.style.display = 'none';
    }
}

// ── Save / New ────────────────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click', function() {
    var hasAny = rounds.some(function(r){ return r.p1!==null || r.p2!==null; });
    if (!hasAny) { toast('No scores to save yet.'); return; }
    var rdIdx  = getRDIdx();
    var rdDone = rdIdx >= 0 && rounds[rdIdx] &&
                 rounds[rdIdx].p1 !== null && rounds[rdIdx].p2 !== null;
    if (!rdDone) { toast('Finish the Rolldown round before saving.'); return; }
    ask('Save this game to history?', function() {
        var t1=0, t2=0, saved=[];
        rounds.forEach(function(r){
            if (r.p1!==null || r.p2!==null) {
                var p1 = r.p1||0, p2 = r.p2||0;
                t1+=p1; t2+=p2;
                saved.push({p1:p1,p2:p2});
            }
        });
        var g = {
            date: new Date().toISOString(),
            p1: db.p1, p2: db.p2,
            t1: t1, t2: t2,
            winner: t1>t2?'p1':t2>t1?'p2':'tie',
            rounds: saved
        };
        if (!db.games) db.games = [];
        db.games.unshift(g);
        saveDB(); clearCur();
        // Show winner
        var wbn = document.getElementById('winner-banner');
        var mg = Math.abs(t1-t2);
        var wn = t1>t2?db.p1:t2>t1?db.p2:null;
        document.getElementById('wn').textContent = wn ? wn+' Wins!' : "It's a Tie!";
        document.getElementById('wm').textContent = wn ? 'By '+mg+' point'+(mg===1?'':'s')+' — saved!' : 'Saved!';
        wbn.style.display = 'block';
        setTimeout(function(){
            wbn.style.display = 'none';
            rounds = [{p1:null,p2:null}];
            renderSheet();
        }, 2500);
    });
});

document.getElementById('btn-new').addEventListener('click', function() {
    var hasAny = rounds.some(function(r){ return r.p1!==null || r.p2!==null; });
    if (!hasAny) { rounds=[{p1:null,p2:null}]; renderSheet(); return; }
    ask('Clear current game and start fresh?', function() {
        clearCur();
        rounds = [{p1:null,p2:null}];
        document.getElementById('winner-banner').style.display = 'none';
        document.getElementById('announce').style.display = 'none';
        renderSheet();
    });
});

// ── History ───────────────────────────────────────────────────────────
function renderHistory() {
    var games = db.games || [];
    var w1=0, w2=0;
    games.forEach(function(g){ if(g.winner==='p1')w1++; else if(g.winner==='p2')w2++; });
    document.getElementById('wc1n').textContent = w1;
    document.getElementById('wc2n').textContent = w2;
    document.getElementById('wn1').textContent  = db.p1;
    document.getElementById('wn2').textContent  = db.p2;
    var list = document.getElementById('hist-list');
    if (!games.length) {
        list.innerHTML = '<p class="empty">No games saved yet.</p>';
        return;
    }
    list.innerHTML = '';
    games.forEach(function(g, i) {
        var d  = new Date(g.date);
        var ds = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'2-digit'});
        var ts = d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        var wn = g.winner==='p1'?g.p1:g.winner==='p2'?g.p2:'Tie';
        var mg = Math.abs((g.t1||0)-(g.t2||0));
        var div = document.createElement('div');
        div.className = 'game-card'+(g.winner==='p1'?' gw1':g.winner==='p2'?' gw2':'');
        div.innerHTML =
          '<div class="gc-top"><span>'+ds+' · '+ts+'</span><span>Game #'+(games.length-i)+'</span></div>'+
          '<div class="gc-row">'+
            '<div class="gc-p1">'+g.p1+'<span class="gc-sc">'+g.t1+'</span></div>'+
            '<div class="gc-mid"><span class="gc-wl">'+wn+'</span>by '+mg+'</div>'+
            '<div class="gc-p2">'+g.p2+'<span class="gc-sc">'+g.t2+'</span></div>'+
          '</div>';
        list.appendChild(div);
    });
}

document.getElementById('btn-clr').addEventListener('click', function() {
    if (!(db.games||[]).length) { toast('History is already empty.'); return; }
    ask('Clear all history? This cannot be undone.', function() {
        db.games = []; saveDB(); renderHistory(); renderRecords(); toast('History cleared.');
    });
});

// ── Records ───────────────────────────────────────────────────────────
function renderRecords() {
    var el = document.getElementById('rec-content');
    var games = db.games || [];
    if (!games.length) { el.innerHTML='<p class="empty">Records appear after you save some games.</p>'; return; }
    var w1=0,w2=0,s1=0,s2=0,b1=[],b2=[];
    games.forEach(function(g){
        if(g.winner==='p1')w1++; if(g.winner==='p2')w2++;
        s1+=g.t1||0; s2+=g.t2||0;
        b1.push({s:g.t1||0,o:g.t2||0,d:g.date});
        b2.push({s:g.t2||0,o:g.t1||0,d:g.date});
    });
    b1.sort(function(a,b){return b.s-a.s;}); b1=b1.slice(0,5);
    b2.sort(function(a,b){return b.s-a.s;}); b2=b2.slice(0,5);
    function fd(iso){ var d=new Date(iso); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}); }
    function rows(arr){ return arr.map(function(g,i){
        return '<tr><td class="rk">'+(i+1)+'</td><td class="sc">'+g.s+'</td><td class="dt">vs '+g.o+'</td><td class="dt">'+fd(g.d)+'</td></tr>';
    }).join(''); }
    var n = games.length;
    el.innerHTML =
      '<div class="rsec"><div class="rtitle">Overall</div>'+
        '<div class="sg2">'+
          '<div class="sbox"><div class="sv">'+n+'</div><div class="sl">Games</div></div>'+
          '<div class="sbox"><div class="sv">'+(w1>w2?db.p1:w2>w1?db.p2:'Even')+'</div><div class="sl">Leader</div></div>'+
        '</div></div>'+
      '<div class="rsec"><div class="rtitle" style="color:#90c0ff">'+db.p1+'</div>'+
        '<div class="sg2" style="margin-bottom:8px">'+
          '<div class="sbox"><div class="sv" style="color:#90c0ff">'+w1+'</div><div class="sl">Wins</div></div>'+
          '<div class="sbox"><div class="sv" style="color:#90c0ff">'+(n?Math.round(s1/n):0)+'</div><div class="sl">Avg</div></div>'+
        '</div>'+
        '<table class="t5"><thead><tr><th>#</th><th>Score</th><th>Opp</th><th>Date</th></tr></thead><tbody>'+rows(b1)+'</tbody></table></div>'+
      '<div class="rsec"><div class="rtitle" style="color:#ff9090">'+db.p2+'</div>'+
        '<div class="sg2" style="margin-bottom:8px">'+
          '<div class="sbox"><div class="sv" style="color:#ff9090">'+w2+'</div><div class="sl">Wins</div></div>'+
          '<div class="sbox"><div class="sv" style="color:#ff9090">'+(n?Math.round(s2/n):0)+'</div><div class="sl">Avg</div></div>'+
        '</div>'+
        '<table class="t5"><thead><tr><th>#</th><th>Score</th><th>Opp</th><th>Date</th></tr></thead><tbody>'+rows(b2)+'</tbody></table></div>';
}

// ── Boot ─────────────────────────────────────────────────────────────
loadDB();
document.getElementById('p1name').value = db.p1 || 'Blue Player';
document.getElementById('p2name').value = db.p2 || 'Red Player';
syncNames();
var cur = loadCur();
if (cur && cur.length) rounds = cur;
renderSheet();
</script>
</body>
</html>
