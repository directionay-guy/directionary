<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>POCKETS Score Sheet</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
    font-family: Georgia, serif;
    background: #1a3020;
    color: #f5f0e4;
    font-size: 16px;
    min-height: 100vh;
    overscroll-behavior: none;
}
#app { max-width: 700px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: #1a2744; }

/* ── Header ── */
header { text-align: center; padding: 8px 12px 6px; background: #243258; border-bottom: 1px solid rgba(200,168,75,0.3); }
header h1 { font-size: 1.3em; color: #c8a84b; font-weight: normal; letter-spacing: 0.14em; }
header p  { font-size: 0.68em; color: #c8b88a; letter-spacing: 0.08em; }

/* ── Tabs ── */
#tabs { display: flex; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(200,168,75,0.2); }
#tabs button {
    flex: 1; padding: 8px 2px;
    background: none; border: none; border-bottom: 2px solid transparent;
    color: #c8b88a; font-family: inherit; font-size: 0.7em;
    letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer;
}
#tabs button.on { color: #c8a84b; border-bottom-color: #c8a84b; }

.panel { display: none; flex-direction: column; flex: 1; overflow-y: auto; }
.panel.on { display: flex; position: relative; }

/* ════════════════════════════════
   SCORE SHEET — Manual mode
   ════════════════════════════════ */

.name-col { display: flex; flex-direction: column; align-items: center; width: 100%; }
.name-input {
    width: 100%; background: transparent; border: none;
    border-bottom: 1px solid rgba(200,168,75,0.3);
    color: inherit; font-family: inherit; font-size: 0.95em;
    font-weight: bold; text-align: center; padding: 2px 4px; outline: none;
}
.name-input:focus { border-bottom-color: #c8a84b; }
.name-select {
    width: 100%; background: #1a2744; border: none;
    border-bottom: 1px solid rgba(200,168,75,0.3);
    color: inherit; font-family: inherit; font-size: 0.88em;
    font-weight: bold; text-align: center; padding: 3px 4px; outline: none;
    -webkit-appearance: none; cursor: pointer;
}
#n1 .name-input, #n1 .name-select { color: #90c0ff; }
#n2 .name-input, #n2 .name-select { color: #ff9090; }
.vs { color: rgba(200,168,75,0.4); font-size: 0.8em; text-align: center; }

/* Mode bar — buttons + name selectors */
#mode-bar {
    background: rgba(0,0,0,0.1);
    border-bottom: 1px solid rgba(200,168,75,0.15);
}
#mode-btns {
    display: flex; align-items: center;
    gap: 10px; padding: 5px 10px 4px;
}
#mode-btns button { flex: 1; text-align: center; }
#btn-mode {
    background: rgba(200,168,75,0.12); border: 1px solid rgba(200,168,75,0.3);
    color: #c8a84b; font-family: inherit; font-size: 0.75em;
    letter-spacing: 0.06em; padding: 4px 12px; border-radius: 3px; cursor: pointer;
}
#btn-bonus {
    background: rgba(40,80,30,0.4); border: 1px solid rgba(100,180,80,0.4);
    color: #90d870; font-family: inherit; font-size: 0.75em;
    letter-spacing: 0.06em; padding: 4px 12px; border-radius: 3px; cursor: pointer;
}
#name-bar {
    display: grid; grid-template-columns: 1fr 30px 1fr;
    align-items: center; gap: 6px;
    padding: 5px 10px 7px;
    border-top: 1px solid rgba(200,168,75,0.1);
}

/* Manual score table */
table { width: 100%; border-collapse: collapse; }
thead th {
    padding: 7px 4px; font-weight: normal; font-size: 0.74em;
    letter-spacing: 0.07em; text-transform: uppercase;
    border-bottom: 1px solid rgba(200,168,75,0.25);
    position: sticky; top: 0; z-index: 2; background: #243258; color: #c8a84b;
}
thead th:nth-child(2) { background: #1e3060; color: #90c0ff; width:50%; }
thead th:nth-child(3) { background: #501818; color: #ff9090; width:50%; }
tbody tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
tbody tr.rd-row { background: #c8a84b; }
tbody tr.rd-row td { border-bottom: none; }
td { padding: 2px 3px; text-align: center; vertical-align: middle; }
.rn { width: 48px; font-size: 1em; font-weight: bold; color: #c8b88a; background: rgba(0,0,0,0.12); }
.rn.rd { color: #2a1508; background: #c8a84b; font-style: italic; font-size: 0.9em; font-weight: bold; }
.p1c { background: rgba(30,48,96,0.55); }
.p2c { background: rgba(80,24,24,0.55); }
tbody tr.rd-row .p1c, tbody tr.rd-row .p2c { background: rgba(180,140,30,0.35); }
.score-input {
    width: 100%; background: transparent; border: none;
    border-bottom: 1px solid rgba(200,168,75,0.15);
    color: #f5f0e4; font-family: inherit; font-size: 1.1em;
    text-align: center; padding: 8px 2px; outline: none;
    min-height: 42px; -webkit-appearance: none;
}
.score-input:focus { background: rgba(255,255,255,0.07); border-bottom-color: #c8a84b; }
.p1c .score-input { color: #b0d0ff; }
.p2c .score-input { color: #ffb0b0; }
.rd-row .score-input { color: #2a1508; font-weight: bold; }
.rd-row .score-input:focus { background: rgba(0,0,0,0.08); border-bottom-color: #2a1508; }
tfoot td {
    padding: 10px 4px; border-top: 2px solid rgba(200,168,75,0.4);
    font-size: 0.72em; letter-spacing: 0.05em; text-transform: uppercase;
    font-weight: bold; color: #c8a84b;
}
tfoot td:nth-child(1) { background: rgba(0,0,0,0.2); }
tfoot td:nth-child(2) { background: rgba(25,50,105,0.9); }
tfoot td:nth-child(3) { background: rgba(80,22,22,0.9); }
.tval { font-size: 2.4em; display: block; line-height: 1; margin-top: 2px; color: #c8a84b; }

#announce {
    display: none; text-align: center; padding: 10px 10px 4px;
    font-size: 1em; font-weight: bold; letter-spacing: 0.08em;
}
#winner-banner { display: none; text-align: center; padding: 14px 10px; background: rgba(200,168,75,0.08); border-top: 1px solid rgba(200,168,75,0.25); }
#winner-banner .wn { font-size: 1.5em; color: #c8a84b; letter-spacing: 0.1em; animation: glo 2s ease-in-out infinite; }
#winner-banner .wm { font-size: 0.8em; color: #c8b88a; margin-top: 3px; }
@keyframes glo { 0%,100%{text-shadow:0 0 8px rgba(200,168,75,0.4)} 50%{text-shadow:0 0 22px rgba(200,168,75,0.9)} }

#btns { display: flex; gap: 8px; padding: 10px; background: rgba(0,0,0,0.15); border-top: 1px solid rgba(200,168,75,0.2); margin-top: auto; }
#btns button { flex: 1; padding: 12px 6px; font-family: inherit; font-size: 0.82em; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; border-radius: 4px; border: 1px solid rgba(200,168,75,0.3); }
#btn-save { background: linear-gradient(180deg,#6e3030,#4d2020); color: #f5f0e4; }
#btn-new  { background: rgba(200,168,75,0.1); color: #c8b88a; }

/* ════════════════════════════════
   DICE MODE
   ════════════════════════════════ */
#dice-wrap { display:none; flex-direction:column; user-select:none; -webkit-user-select:none; position:relative; }
#dice-wrap.on { display:flex; }
#dice-wrap { --ps: clamp(80px, 12vw, 120px); }

/* Three-section column layout */
#dice-main-area {
    display:flex; flex-direction:row; align-items:stretch;
    gap:4px; padding:4px 4px 2px;
    height:calc(var(--ps) * 3 + 8px + 6px); /* 3 pockets + 2 gaps + row padding */
    flex-shrink:0;
}

#blue-keeps, #red-keeps {
    display:flex; flex-direction:column; gap:4px;
    flex-shrink:0; width:var(--ps);
}
#dice-center-col {
    flex:1; min-width:0;
    display:flex; flex-direction:column; gap:4px;
    overflow:hidden;
}
#dice-wrap.rd-mode #dice-center-col {
    flex: 0 0 calc(var(--ps) * 2 + 4px);
}
#dice-wrap.rd-mode #dice-main-area {
    justify-content: center;
}
#dice-score-center {
    flex:1; min-width:0; min-height:0;
    overflow-y:auto; overflow-x:hidden;
    border:1px solid rgba(200,168,75,0.2);
    border-radius:6px; background:#1a2744;
}

#dice-bot-row {
    display:flex; flex-direction:row;
    border-top:2px solid rgba(200,168,75,0.4);
    margin:0 4px 2px;
    border-radius:0 0 6px 6px; overflow:hidden;
}

/* Individual pocket — always square */
.dice-pocket {
    width:var(--ps); height:var(--ps); flex-shrink:0;
    border:2px solid rgba(200,168,75,0.2); border-radius:6px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:space-between;
    padding:7px 4px 5px; transition:border-color 0.2s;
    background:transparent;
}
.dice-pocket.blue-pocket { border-color:rgba(80,130,240,0.4); background:rgba(20,40,100,0.35); }
.dice-pocket.red-pocket  { border-color:rgba(200,80,80,0.55); background:rgba(80,20,20,0.35); }
.dice-pocket.tapped.blue-pocket { border-color:#90c0ff; background:rgba(30,60,140,0.4); }
.dice-pocket.tapped.red-pocket  { border-color:#ff9090; background:rgba(120,30,30,0.4); }

.pocket-lbl {
    font-size:0.72em; text-transform:uppercase; letter-spacing:0.08em;
    color:rgba(200,168,75,0.65); text-align:center; line-height:1.1; font-weight:bold;
}
.pocket-val {
    font-size:3.2em; font-weight:bold; line-height:1;
    flex:1; display:flex; align-items:center; justify-content:center;
}
.pocket-val.blue-val { color:#ffffff; text-shadow:0 0 20px rgba(144,192,255,0.9); }
.pocket-val.red-val  { color:#ffffff; text-shadow:0 0 20px rgba(255,144,144,0.9); }
.pocket-val.empty    { color:rgba(255,255,255,0.06); font-size:1em; text-shadow:none; }

.num-row { display:flex; gap:2px; width:100%; }
.num-btn {
    flex:1; min-width:0; height:22px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1); border-radius:2px;
    color:rgba(255,255,255,0.3); font-family:inherit;
    font-size:0.74em; font-weight:bold; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.12s; padding:0;
}
.num-btn.blue-btn { color:rgba(144,192,255,0.45); }
.num-btn.red-btn  { color:rgba(255,144,144,0.45); }
.num-btn.selected.blue-btn { background:rgba(50,90,200,0.5); border-color:#90c0ff; color:#fff; }
.num-btn.selected.red-btn  { background:rgba(150,40,40,0.5); border-color:#ff9090; color:#fff; }
.num-btn.faded { opacity:0.15; }

/* Rolldown half-width pockets (extra + split share) */
.dice-pocket.rd-half {
    flex: 1;
    width: auto;
    height: calc(var(--ps) * 0.85);
    min-height: 70px;
    aspect-ratio: unset;
}

#dice-score-center table { width:100%; border-collapse:collapse; table-layout:fixed; }
#dice-score-center thead th {
    background:#243258; color:#c8a84b; padding:5px 3px;
    font-size:0.7em; letter-spacing:0.05em; font-weight:normal;
    position:sticky; top:0; z-index:2;
    border-bottom:1px solid rgba(200,168,75,0.25);
}
#dice-score-center thead th:nth-child(1) { width:24px; }
#dice-score-center thead th:nth-child(2) { background:#1e3060; color:#90c0ff; width:calc(50% - 12px); }
#dice-score-center thead th:nth-child(3) { background:#501818; color:#ff9090; width:calc(50% - 12px); }
#dice-score-center .live-row td { background:rgba(200,168,75,0.06); }

/* TOTAL row */
.dtc { flex:1; text-align:center; padding:6px 3px;
       display:flex; align-items:center; justify-content:center; }
.dtc-lbl { flex:0 0 34px; background:rgba(0,0,0,0.3);
           font-size:0.52em; text-transform:uppercase;
           letter-spacing:0.07em; color:#c8b88a; }
.dtc-b { background:rgba(20,50,110,0.9); }
.dtc-r { background:rgba(80,20,20,0.9); }
.dtval { font-size:1.5em; font-weight:bold; color:#c8a84b; }

/* Share pocket — fixed row of two --ps pockets at bottom of center col */
#share-pocket {
    flex-shrink:0;
    display:flex; flex-direction:row; justify-content:center; gap:4px;
    height:var(--ps);
}
/* In RD mode, share-pocket becomes a 2-row column of pocket pairs */
#dice-wrap.rd-mode #share-pocket {
    flex-direction:column;
    height:calc(var(--ps) * 2 + 4px);
    justify-content:flex-start;
}
.spr { display:flex; align-items:center; gap:5px; }
.spr-lbl {
    font-size:0.6em; font-weight:bold; text-transform:uppercase;
    letter-spacing:0.05em; width:56px; flex-shrink:0; text-align:right;
}
.spr-lbl.bl { color:#90c0ff; }
.spr-lbl.rl { color:#ff9090; }
.spr-nums { display:flex; gap:2px; flex:1; }
.spr-nums .num-btn { height:22px; font-size:0.74em; }
.spr-val { width:22px; text-align:center; font-size:1.1em; font-weight:bold; }
.spr-val.bl { color:#90c0ff; }
.spr-val.rl { color:#ff9090; }
.share-die-space {
    flex:1; display:flex; align-items:center; justify-content:center;
    gap:20%; color:rgba(255,255,255,0.07); font-size:2em; min-height:36px;
}
.share-result-line {
    text-align:center; font-size:0.76em; font-weight:bold;
    color:#c8a84b; letter-spacing:0.04em; min-height:16px;
}
@keyframes shareGlow {
    0%,100% { opacity:1; text-shadow:none; }
    50% { opacity:0.75; text-shadow:0 0 10px currentColor; }
}
.share-result-line.throbbing {
    animation: shareGlow 0.8s ease-in-out 4;
}
#dice-bonus-bar {
    text-align:center; padding:3px 10px; font-size:0.74em;
    color:#c8b88a; background:rgba(0,0,0,0.15);
    border-top:1px solid rgba(200,168,75,0.1); letter-spacing:0.04em;
}
#flash {
    position:absolute; top:30%; left:50%;
    transform:translate(-50%,-50%);
    background:rgba(200,168,75,0.96); color:#1a2744;
    font-weight:bold; font-size:1.1em; letter-spacing:0.06em;
    padding:16px 24px; border-radius:8px; z-index:500;
    display:none; text-align:center; pointer-events:none;
    box-shadow:0 4px 24px rgba(0,0,0,0.7); white-space:pre-line;
    width:80%; max-width:320px;
}

/* ════════════════════════════════
   SIGN UP TAB
   ════════════════════════════════ */
.signup-title {
    padding: 10px 12px 6px;
    font-size: 0.75em; text-transform: uppercase;
    letter-spacing: 0.1em; color: #c8a84b;
    border-bottom: 1px solid rgba(200,168,75,0.2);
    background: rgba(0,0,0,0.1);
}
.add-form {
    display: flex; gap: 6px; padding: 10px;
    background: rgba(0,0,0,0.15);
    border-bottom: 1px solid rgba(200,168,75,0.2);
    align-items: flex-end; flex-wrap: wrap;
}
.add-form label { font-size: 0.7em; color: #c8b88a; letter-spacing: 0.05em; display: flex; flex-direction: column; gap: 3px; }
.add-form input {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(200,168,75,0.25);
    border-radius: 3px; color: #f5f0e4;
    font-family: inherit; font-size: 0.9em;
    padding: 6px 8px; outline: none; width: 100%;
}
.add-form input:focus { border-color: #c8a84b; }
#inp-name { width: 140px; }
#inp-init { width: 60px; }
#btn-add {
    background: linear-gradient(180deg,#3a5a2a,#2a4a1a);
    border: 1px solid rgba(100,180,80,0.4);
    color: #90d870; font-family: inherit;
    font-size: 0.82em; padding: 7px 16px;
    border-radius: 4px; cursor: pointer;
    white-space: nowrap; letter-spacing: 0.05em;
}
.roster-count { padding: 6px 12px; font-size: 0.72em; color: #c8b88a; background: rgba(0,0,0,0.1); border-bottom: 1px solid rgba(200,168,75,0.1); }
.roster-item {
    display: flex; align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid rgba(200,168,75,0.08);
}
.roster-num  { width: 28px; font-size: 0.75em; color: rgba(200,168,75,0.4); }
.roster-name { flex: 1; font-size: 0.95em; color: #f5f0e4; }
.roster-init { font-size: 0.8em; color: #c8b88a; margin-right: 10px; }
.roster-del  { background: rgba(110,48,48,0.3); border: 1px solid rgba(110,48,48,0.5); color: #ff9090; font-family: inherit; font-size: 0.75em; padding: 4px 10px; border-radius: 3px; cursor: pointer; }
.roster-empty { text-align: center; padding: 30px; color: #c8b88a; font-style: italic; font-size: 0.85em; }

/* ════════════════════════════════
   HISTORY
   ════════════════════════════════ */
#wincounts { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid rgba(200,168,75,0.2); }
.wc { padding: 10px; text-align: center; }
.wc:first-child { border-right: 1px solid rgba(200,168,75,0.2); }
.wc-lbl { font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.08em; color: #c8b88a; }
.wc-name { font-size: 0.9em; font-weight: bold; margin: 2px 0; }
.wc-n { font-size: 1.8em; font-weight: bold; color: #c8a84b; line-height: 1; }
#wc1 .wc-name { color: #90c0ff; }
#wc2 .wc-name { color: #ff9090; }
.game-card { padding: 10px 12px; border-bottom: 1px solid rgba(200,168,75,0.08); border-left: 3px solid transparent; }
.game-card.gw1 { border-left-color: #90c0ff; }
.game-card.gw2 { border-left-color: #ff9090; }
.gc-top { display: flex; justify-content: space-between; font-size: 0.7em; color: #c8b88a; margin-bottom: 5px; }
.gc-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 4px; }
.gc-p1 { color: #90c0ff; }
.gc-p2 { color: #ff9090; text-align: right; }
.gc-sc { font-size: 1.5em; font-weight: bold; display: block; line-height: 1; }
.gc-mid { text-align: center; font-size: 0.72em; color: #c8b88a; }
.gc-wl { color: #c8a84b; display: block; }
.empty { text-align: center; padding: 30px; color: #c8b88a; font-style: italic; font-size: 0.85em; }
#btn-clr { margin: 10px; padding: 9px; width: calc(100% - 20px); background: rgba(110,48,48,0.25); border: 1px solid rgba(110,48,48,0.5); color: #c8b88a; font-family: inherit; font-size: 0.78em; letter-spacing: 0.05em; cursor: pointer; border-radius: 4px; }

/* ════════════════════════════════
   RECORDS
   ════════════════════════════════ */
#rec-search { width: 100%; padding: 9px 12px; background: rgba(0,0,0,0.2); border: none; border-bottom: 1px solid rgba(200,168,75,0.25); color: #f5f0e4; font-family: inherit; font-size: 0.9em; outline: none; }
#rec-search::placeholder { color: rgba(200,168,75,0.4); }
.player-card { border-bottom: 1px solid rgba(200,168,75,0.1); }
.player-card-hdr { display: flex; align-items: center; padding: 10px 12px; cursor: pointer; gap: 10px; background: rgba(0,0,0,0.1); user-select: none; -webkit-user-select: none; }
.player-card-hdr:active { background: rgba(200,168,75,0.08); }
.pc-name { flex: 1; font-weight: bold; font-size: 0.95em; color: #f5f0e4; }
.pc-meta { font-size: 0.75em; color: #c8b88a; text-align: right; line-height: 1.4; }
.pc-arrow { color: rgba(200,168,75,0.5); font-size: 0.8em; transition: transform 0.2s; }
.player-card.open .pc-arrow { transform: rotate(90deg); }
.player-card-body { display: none; padding: 10px 12px 14px; background: rgba(0,0,0,0.08); border-top: 1px solid rgba(200,168,75,0.1); }
.player-card.open .player-card-body { display: block; }
.pc-stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
.pc-sbox { background: rgba(255,255,255,0.04); border: 1px solid rgba(200,168,75,0.2); border-radius: 4px; padding: 6px 4px; text-align: center; }
.pc-sbox .sv { font-size: 1.3em; font-weight: bold; color: #c8a84b; line-height: 1; }
.pc-sbox .sl { font-size: 0.62em; text-transform: uppercase; letter-spacing: 0.05em; color: #c8b88a; margin-top: 1px; }
.pc-section-title { font-size: 0.72em; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(200,168,75,0.6); margin: 8px 0 4px; }
.h2h-table { width: 100%; border-collapse: collapse; font-size: 0.82em; }
.h2h-table td { padding: 4px 5px; border-bottom: 1px solid rgba(255,255,255,0.04); color: #f5f0e4; }
.h2h-table td:last-child { text-align: right; color: #c8b88a; }
.top5-mini { width: 100%; border-collapse: collapse; font-size: 0.82em; }
.top5-mini td { padding: 4px 5px; border-bottom: 1px solid rgba(255,255,255,0.04); color: #f5f0e4; }

.top5-mini td:nth-child(2) { font-weight: bold; }

.top5-mini tr:first-child td { color: #c8a84b; }

/* ── Bonus modal ── */
#bonus-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 9999; align-items: flex-start; justify-content: center; padding: 20px; padding-top: 80px; }
#bonus-modal.on { display: flex; }
#bonus-box { background: #1a3020; border: 2px solid #c8a84b; border-radius: 8px; padding: 20px; max-width: 320px; width: 100%; }

#modal.on { display: flex; }
#mbox { background: #243258; border: 2px solid #c8a84b; border-radius: 8px; padding: 24px 20px; max-width: 300px; width: 100%; text-align: center; }
#mbox p { color: #f5f0e4; font-size: 1em; line-height: 1.5; margin-bottom: 20px; }
#mbox .mbts { display: flex; gap: 10px; }
#mbox button { flex: 1; padding: 14px 8px; font-family: inherit; font-size: 1em; border-radius: 6px; cursor: pointer; border: 1px solid rgba(200,168,75,0.3); min-height: 50px; }
#m-yes { background: linear-gradient(180deg,#6e3030,#4d2020); color: #f5f0e4; }
#m-no  { background: rgba(200,168,75,0.1); color: #c8b88a; }

/* Toast */
#toast { position: fixed; top: 35%; left: 50%; transform: translateX(-50%) translateY(-20px); background: #1a2744; border: 2px solid #c8a84b; color: #c8a84b; padding: 14px 32px; border-radius: 10px; font-size: 1.1em; letter-spacing: 0.08em; font-weight: bold; opacity: 0; transition: all 0.35s; z-index: 9500; pointer-events: none; white-space: nowrap; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
#toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

4" cx="12.1" cy="3" r="1.5"/><circle fill="#1a2744" cx="5.2" cy="13" r="1.5"/><circle fill="#1a2744" cx="12.1" cy="9" r="1.5"/><circle fill="#1a2744" cx="-12.97" cy="-2.5" r="1.5"/><circle fill="#1a2744" cx="-4.33" cy="2.5" r="1.5"/><circle fill="#1a2744" cx="-12.97" cy="7.5" r="1.5"/><circle fill="#1a2744" cx="-4.33" cy="12.5" r="1.5"/></svg></h1>

<script>
// == Storage ========================================================
var KEY  = 'pockets-v1';
var CKEY = 'pockets-v1-cur';
var db   = {p1:'Blue Player', p2:'Red Player', games:[], roster:[]};
var rounds = [{p1:null, p2:null}];
var pendingCb = null;
var diceMode = false;

function loadDB() {
    try { var d=JSON.parse(localStorage.getItem(KEY)); if(d) db=d; } catch(e){}
    if (!db.roster) db.roster = [];
    if (!db.games)  db.games  = [];
}
function saveDB() { try { localStorage.setItem(KEY, JSON.stringify(db)); } catch(e){} }
function saveCur() { try { localStorage.setItem(CKEY, JSON.stringify(rounds)); } catch(e){} }
function loadCur() { try { var d=JSON.parse(localStorage.getItem(CKEY)); if(d&&d.length) return d; } catch(e){} return null; }
function clearCur() { try { localStorage.removeItem(CKEY); } catch(e){} }

// == Utilities ======================================================
function genId() { return 'p'+Date.now()+Math.random().toString(36).substr(2,4); }
function getDisplayName(p) { return p.initials ? p.name+' '+p.initials : p.name; }

function toast(msg) {
    var t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('on');
    setTimeout(function(){ t.classList.remove('on'); }, 4000);
}
var flashTimer = null;
function showFlash(msg, dur) {
    var f=document.getElementById('flash');
    if (flashTimer) { clearTimeout(flashTimer); flashTimer=null; }
    f.textContent=msg; f.style.display='block';
    f.style.pointerEvents='none'; f.style.cursor='default';
    flashTimer = setTimeout(function(){ f.style.display='none'; flashTimer=null; }, dur||1500);
}

// == Confirm modal ==================================================
function ask(msg, cb) {
    // Hide flash card if visible so they don't stack
    var fl = document.getElementById('flash');
    if (fl && fl.style.display === 'block') { fl.style.display = 'none'; }
    document.getElementById('m-msg').textContent=msg;
    pendingCb=cb;
    document.getElementById('modal').classList.add('on');
}
document.getElementById('m-yes').addEventListener('click', function(){
    document.getElementById('modal').classList.remove('on');
    var cb=pendingCb; pendingCb=null; if(cb) cb();
});
document.getElementById('m-no').addEventListener('click', function(){
    document.getElementById('modal').classList.remove('on'); pendingCb=null;
});

// == Bonus modal ====================================================
document.getElementById('btn-bonus').addEventListener('click', function(){
    document.getElementById('bonus-modal').classList.add('on');
});
document.getElementById('btn-dismiss').addEventListener('click', function(){
    document.getElementById('bonus-modal').classList.remove('on');
});

// == Tabs ===========================================================
function showTab(panel, btn) {
    ['p-sheet','p-signup','p-hist','p-rec'].forEach(function(id){ document.getElementById(id).classList.remove('on'); });
    ['t-sheet','t-signup','t-hist','t-rec'].forEach(function(id){ document.getElementById(id).classList.remove('on'); });
    document.getElementById(panel).classList.add('on');
    document.getElementById(btn).classList.add('on');
    if (panel==='p-hist')   renderHistory();
    if (panel==='p-rec')    { var s=document.getElementById('rec-search'); renderRecords(s?s.value:''); }
    if (panel==='p-signup') renderRoster();
}
document.getElementById('t-sheet') .addEventListener('click', function(){ showTab('p-sheet', 't-sheet'); });
document.getElementById('t-signup').addEventListener('click', function(){ showTab('p-signup','t-signup'); });
document.getElementById('t-hist')  .addEventListener('click', function(){ showTab('p-hist',  't-hist'); });
document.getElementById('t-rec')   .addEventListener('click', function(){ showTab('p-rec',   't-rec'); });

// == Roster / Sign Up ================================================
function renderRoster() {
    var list = document.getElementById('roster-list');
    var cnt  = document.getElementById('roster-count');
    var r = db.roster || [];
    cnt.textContent = r.length + ' player' + (r.length!==1?'s':'') + ' in roster';
    if (!r.length) { list.innerHTML='<p class="roster-empty">No players yet. Add some above!</p>'; return; }
    list.innerHTML='';
    r.forEach(function(p, i) {
        var div = document.createElement('div');
        div.className = 'roster-item';
        div.innerHTML =
            '<span class="roster-num">'+(i+1)+'.</span>'+
            '<span class="roster-name">'+getDisplayName(p)+'</span>'+
            (p.initials?'<span class="roster-init">'+p.initials+'</span>':'')+
            '<button class="roster-del" data-id="'+p.id+'">Remove</button>';
        list.appendChild(div);
    });
    list.querySelectorAll('.roster-del').forEach(function(btn){
        btn.addEventListener('click', function(){
            var id = this.dataset.id;
            ask('Remove this player from the roster?', function(){
                db.roster = (db.roster||[]).filter(function(p){ return p.id!==id; });
                saveDB(); renderRoster(); updateNameSelects();
            });
        });
    });
}

document.getElementById('btn-add').addEventListener('click', function(){
    var name = document.getElementById('inp-name').value.trim();
    var init = document.getElementById('inp-init').value.trim().toUpperCase();
    if (!name) { toast('Please enter a first name.'); return; }
    var display = init ? name+' '+init : name;
    var exists = (db.roster||[]).some(function(p){ return getDisplayName(p).toLowerCase()===display.toLowerCase(); });
    if (exists) { toast(display+' is already in the roster.'); return; }
    if (!db.roster) db.roster=[];
    db.roster.push({id:genId(), name:name, initials:init});
    saveDB();
    document.getElementById('inp-name').value='';
    document.getElementById('inp-init').value='';
    renderRoster(); updateNameSelects();
    toast(display+' added!');
});

// Enter key on name input moves to initials, enter on initials adds player
document.getElementById('inp-name').addEventListener('keydown', function(e){
    if (e.key==='Enter') { e.preventDefault(); document.getElementById('inp-init').focus(); }
});
document.getElementById('inp-init').addEventListener('keydown', function(e){
    if (e.key==='Enter') { e.preventDefault(); document.getElementById('btn-add').click(); }
});

// == Name selects / inputs ===========================================
function updateNameSelects() {
    var r = db.roster || [];
    var useDropdowns = r.length > 0;
    var p1sel = document.getElementById('p1sel');
    var p2sel = document.getElementById('p2sel');
    var p1inp = document.getElementById('p1name');
    var p2inp = document.getElementById('p2name');

    if (useDropdowns) {
        // Build options
        var opts = '<option value="">\u2014 Select Player \u2014</option>';
        r.forEach(function(p){ opts += '<option value="'+p.id+'">'+getDisplayName(p)+'</option>'; });
        p1sel.innerHTML = opts;
        p2sel.innerHTML = opts;
        // Restore previous selection if still in roster
        var cur1 = (db.roster||[]).find(function(p){ return getDisplayName(p)===db.p1; });
        var cur2 = (db.roster||[]).find(function(p){ return getDisplayName(p)===db.p2; });
        if (cur1) p1sel.value = cur1.id;
        if (cur2) p2sel.value = cur2.id;
        p1sel.style.display='block'; p1inp.style.display='none';
        p2sel.style.display='block'; p2inp.style.display='none';
    } else {
        p1sel.style.display='none'; p1inp.style.display='block';
        p2sel.style.display='none'; p2inp.style.display='block';
    }
}

function syncNames() {
    var r = db.roster || [];
    if (r.length > 0) {
        var id1 = document.getElementById('p1sel').value;
        var id2 = document.getElementById('p2sel').value;
        var p1  = r.find(function(p){ return p.id===id1; });
        var p2  = r.find(function(p){ return p.id===id2; });
        db.p1 = p1 ? getDisplayName(p1) : 'Blue Player';
        db.p2 = p2 ? getDisplayName(p2) : 'Red Player';
    } else {
        db.p1 = document.getElementById('p1name').value.trim() || 'Blue Player';
        db.p2 = document.getElementById('p2name').value.trim() || 'Red Player';
    }
    saveDB();
    document.getElementById('h1').textContent  = db.p1;
    document.getElementById('h2').textContent  = db.p2;
    document.getElementById('wn1').textContent = db.p1;
    document.getElementById('wn2').textContent = db.p2;
    // Dice board headers update when buildDiceBoard() is called
    // Rebuild dice board labels if in Dice Board
    if (diceMode) buildDiceBoard();
}

document.getElementById('p1name').addEventListener('input', syncNames);
document.getElementById('p2name').addEventListener('input', syncNames);
document.getElementById('p1name').addEventListener('blur', function(){ if(!this.value.trim()){this.value='Blue Player';} syncNames(); });
document.getElementById('p2name').addEventListener('blur', function(){ if(!this.value.trim()){this.value='Red Player';} syncNames(); });
document.getElementById('p1sel').addEventListener('change', syncNames);
document.getElementById('p2sel').addEventListener('change', syncNames);

// == Rolldown detection =============================================
function getRDIdx() {
    var r1=0, r2=0;
    for (var i=0; i<rounds.length; i++) {
        if (rounds[i].p1!==null && rounds[i].p2!==null) {
            r1+=rounds[i].p1; r2+=rounds[i].p2;
            if (r1>=100 || r2>=100) return i+1;
        }
    }
    return -1;
}

// == Manual score sheet =============================================
function renderSheet() {
    var tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    var rdIdx = getRDIdx();
    for (var i=0; i<rounds.length; i++) {
        var isRD = (i===rdIdx);
        var tr   = document.createElement('tr');
        if (isRD) tr.className='rd-row';
        var tn = document.createElement('td');
        tn.className = 'rn'+(isRD?' rd':'');
        tn.textContent = isRD ? 'RD' : (i+1);
        tr.appendChild(tn);
        tr.appendChild(makeCell(i,'p1','p1c',isRD));
        tr.appendChild(makeCell(i,'p2','p2c',isRD));
        tbody.appendChild(tr);
    }
    updateTotals();
}

function makeCell(idx, player, cls, isRD) {
    var td  = document.createElement('td');
    td.className = cls;
    var inp = document.createElement('input');
    inp.type='text'; inp.inputMode='numeric'; inp.pattern='[0-9]*';
    inp.autocomplete='off'; inp.className='score-input';
    inp.value = rounds[idx][player]!==null ? rounds[idx][player] : '';
    inp.addEventListener('input', function(){
        var v=this.value.replace(/[^0-9]/g,'');
        var cap=isRD?40:21;
        if(v!==''&&parseInt(v)>cap) v=String(cap);
        this.value=v;
        rounds[idx][player]=v===''?null:parseInt(v);
        saveCur();
        var prev=getRDIdx(); updateTotals();
        if(getRDIdx()!==prev) renderSheet();
    });
    inp.addEventListener('blur', function(){
        var v=this.value;
        if(v!==''){var fl=isRD?15:2; if(parseInt(v)<fl){this.value=String(fl);rounds[idx][player]=fl;saveCur();updateTotals();}}
        if(idx===rounds.length-1&&!isRD&&rounds[idx].p1!==null&&rounds[idx].p2!==null){
            rounds.push({p1:null,p2:null}); renderSheet();
            setTimeout(function(){ var ins=document.querySelectorAll('.p1c input'); if(ins.length) ins[ins.length-1].focus(); },40);
        }
    });
    inp.addEventListener('keydown', function(e){
        if(e.key==='Enter'||e.keyCode===13){
            e.preventDefault();
            var all=Array.from(document.querySelectorAll('.score-input'));
            var next=all[all.indexOf(this)+1];
            if(next) next.focus(); else this.blur();
        }
    });
    inp.addEventListener('focus', function(){ this.select(); });
    td.appendChild(inp);
    return td;
}

function updateTotals() {
    var t1=0,t2=0;
    rounds.forEach(function(r){ if(r.p1!==null)t1+=r.p1; if(r.p2!==null)t2+=r.p2; });
    document.getElementById('t1').textContent=t1;
    document.getElementById('t2').textContent=t2;
    var ann=document.getElementById('announce');
    var rdIdx=getRDIdx();
    var rdDone=rdIdx>=0&&rounds[rdIdx]&&rounds[rdIdx].p1!==null&&rounds[rdIdx].p2!==null;
    var n1=db.p1,n2=db.p2,mg=Math.abs(t1-t2);
    if(t1===0&&t2===0){ann.style.display='none';}
    else if(rdDone){
        ann.style.display='block';
        if(t1>t2){ann.style.color='#90c0ff';ann.textContent=n1+' Wins by '+mg+'!';}
        else if(t2>t1){ann.style.color='#ff9090';ann.textContent=n2+' Wins by '+mg+'!';}
        else{ann.style.color='#c8a84b';ann.textContent="It's a Tie!";}
    } else if(t1>0||t2>0){
        ann.style.display='block';
        if(t1>t2){ann.style.color='#90c0ff';ann.textContent=n1+' leads by '+mg;}
        else if(t2>t1){ann.style.color='#ff9090';ann.textContent=n2+' leads by '+mg;}
        else{ann.style.color='#c8a84b';ann.textContent='Tied at '+t1;}
    } else { ann.style.display='none'; }
}

// == Combo calculation ==============================================
function calcCombo(dice) {
    var vals = dice.filter(function(d){ return d!==null&&d!==undefined; });
    if (vals.length < 2) return 0;
    var counts = {};
    vals.forEach(function(d){ counts[d]=(counts[d]||0)+1; });
    var cnts = Object.values(counts).sort(function(a,b){return b-a;});
    var keys = Object.keys(counts).map(Number).sort(function(a,b){return a-b;});
    var n = vals.length;
    if (cnts[0]>=5) return 10;
    if (cnts[0]>=4) return 6;
    if (cnts[0]>=3 && cnts[1]>=2) return 4; // full house
    if (cnts[0]>=3) return 3;
    // straight: need 4+ consecutive unique values
    if (keys.length>=4) {
        for (var i=0; i<=keys.length-4; i++) {
            if (keys[i+3]-keys[i]===3 && cnts[i]===1) {
                // check all consecutive
                var str=true;
                for(var j=1;j<4;j++){if(keys[i+j]!==keys[i]+j){str=false;break;}}
                if(str) return 5;
            }
        }
    }
    if (cnts[0]>=2 && cnts.length>=2 && cnts[1]>=2) return 2;
    if (cnts[0]>=2) return 1;
    return 0;
}

function comboName(pts) {
    var names={1:'1 Pair',2:'2 Pair',3:'3 of a Kind',4:'Full House',5:'Straight',6:'4 of a Kind',10:'5 of a Kind'};
    return names[pts]||'';
}

var dv = { bk1:null, bk2:null, bdie3:null, bdie4:null, bsave:null, rk1:null, rk2:null, rdie3:null, rdie4:null, rsave:null, shareB:null, shareR:null };
var savedBSave = null, savedRSave = null;
var isTablet = false;

// Dice Board only works in landscape on a screen >= 600px wide
function diceBoardAllowed() {
    return window.innerWidth >= 600 && window.innerWidth > window.innerHeight;
}

function switchToDiceBoardBlocked() {
    var w = window.innerWidth;
    var landscape = window.innerWidth > window.innerHeight;
    var msg, btn;
    if (w < 500) {
        msg = 'Dice Board isn\u2019t available on small screens.\n\nTally Mode works great for keeping score on your phone!';
        btn = 'OK';
    } else if (!landscape) {
        msg = 'Dice Board needs landscape orientation.\n\nRotate your device sideways, then tap \u201cSwitch to Dice Board\u201d again.';
        btn = 'OK';
    } else {
        msg = 'Dice Board requires a wider screen.\n\nTry on a tablet or desktop in landscape mode.';
        btn = 'OK';
    }
    // Show as a simple modal — just inform, no choice
    var m = document.getElementById('modal');
    var msgEl = document.getElementById('m-msg');
    if (msgEl) msgEl.textContent = msg;
    // Reuse the modal but override buttons to single OK
    var yes = document.getElementById('m-yes');
    var no  = document.getElementById('m-no');
    if (yes) { yes.textContent = btn; yes.style.width = '100%'; }
    if (no)  { no.style.display = 'none'; }
    pendingCb = function() {
        if (yes) yes.style.width = '';
        if (no)  no.style.display = '';
    };
    if (m) m.classList.add('on');
}

function applyOrientationMode() {
    if (!diceMode) return;
    var isPortrait = window.innerWidth <= window.innerHeight;
    var banner = document.getElementById('portrait-warning');
    if (isPortrait) {
        if (!banner) {
            banner = document.createElement('div');
            banner.id = 'portrait-warning';
            banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:8000;background:rgba(200,168,75,0.95);color:#1a2744;text-align:center;padding:8px 40px 8px 12px;font-size:0.85em;font-weight:bold;letter-spacing:0.05em;';
            banner.innerHTML = '\u21BB Rotate to landscape for best Dice Board experience &nbsp;';
            var x = document.createElement('span');
            x.textContent = '\u2715';
            x.style.cssText = 'position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:1.1em;';
            x.onclick = function(){ banner.style.display='none'; };
            banner.appendChild(x);
            document.body.appendChild(banner);
        } else {
            banner.style.display = '';
        }
    } else {
        if (banner) banner.style.display = 'none';
    }
}

function doSwitchMode() {
    var btn = document.getElementById('btn-mode');
    var ms  = document.getElementById('manual-section');
    var dw  = document.getElementById('dice-wrap');
    if (!diceMode) {
        diceMode = true;
        btn.textContent  = 'Switch to Tally Mode';
        ms.style.display = 'none';
        dw.className     = 'on tablet';
        rounds = [{p1:null, p2:null}];
        dv = {bk1:null,bk2:null,bdie3:null,bdie4:null,bsave:null,rk1:null,rk2:null,rdie3:null,rdie4:null,rsave:null,shareB:null,shareR:null};
        savedBSave=null; savedRSave=null;
        clearCur();
        buildDiceBoard();
    } else {
        diceMode = false;
        btn.textContent  = 'Switch to Dice Board';
        ms.style.display = '';
        dw.classList.remove('on');
        rounds = [{p1:null, p2:null}];
        clearCur();
        renderSheet();
    }
}

function switchMode() {
    if (!diceMode && !diceBoardAllowed()) {
        switchToDiceBoardBlocked();
        return;
    }
    var hasAny = rounds.some(function(r){ return r.p1!==null||r.p2!==null; });
    if (!hasAny) { doSwitchMode(); return; }
    var toMode = diceMode ? 'Tally Mode' : 'Dice Board';
    ask('Switch to ' + toMode + '? The current game will be cleared.', doSwitchMode);
}

document.getElementById('btn-mode').addEventListener('click', switchMode);
window.addEventListener('resize', applyOrientationMode);
window.addEventListener('orientationchange', function(){ setTimeout(applyOrientationMode, 300); });

function buildDiceBoard() {
    dv = { bk1:null, bk2:null, bdie3:null, bdie4:null, bsave:null, rk1:null, rk2:null, rdie3:null, rdie4:null, rsave:null, shareB:null, shareR:null };

    var rdIdx = getRDIdx();
    var lastR = rounds[rounds.length-1];
    var isRD = (rdIdx >= 0 && rounds.length - 1 === rdIdx && lastR.p1===null && lastR.p2===null);

    // Blue keeps
    var bk = document.getElementById('blue-keeps');
    bk.innerHTML = '';
    // Red keeps
    var rk = document.getElementById('red-keeps');
    rk.innerHTML = '';

    // Side columns: RD1/RD2/Save in RD mode, Keep1/Keep2/Save in regular
    bk.appendChild(makePocket('blue-pocket','bk1', isRD?'RD 1':'Keep 1','blue',true));
    bk.appendChild(makePocket('blue-pocket','bk2', isRD?'RD 2':'Keep 2','blue',true));
    bk.appendChild(makePocket('blue-pocket','bsave','Save','blue',true));

    rk.appendChild(makePocket('red-pocket','rk1', isRD?'RD 1':'Keep 1','red',true));
    rk.appendChild(makePocket('red-pocket','rk2', isRD?'RD 2':'Keep 2','red',true));
    rk.appendChild(makePocket('red-pocket','rsave','Save','red',true));

    // Pre-fill save values in Rolldown
    if (isRD && savedBSave!==null) { preTapPocket('bsave', savedBSave, 'blue'); lockPocket('bsave'); }
    if (isRD && savedRSave!==null) { preTapPocket('rsave', savedRSave, 'red');  lockPocket('rsave'); }

    // Build center area (Share for regular, RD banner for Rolldown)
    buildCenterBottom(isRD);

    // Header names
    var dh1=document.getElementById('dh1'), dh2=document.getElementById('dh2');
    if (dh1) dh1.textContent = db.p1;
    if (dh2) dh2.textContent = db.p2;

    renderDiceSheet();
    updateDiceTotals();
    setShareResult('','');
}

function preTapPocket(key, val, color) {
    dv[key] = val;
    var valEl = document.getElementById('dval-'+key);
    if (valEl) {
        valEl.textContent = val;
        valEl.classList.remove('empty');
        valEl.style.color = (color==='blue') ? '#7ab8f5' : '#e07878';
        valEl.style.textShadow = '0 2px 4px rgba(0,0,0,0.7), 0 1px 0 rgba(0,0,0,0.5)';
    }
    var allBtns = document.querySelectorAll('[data-key="'+key+'"]');
    allBtns.forEach(function(b){
        if (parseInt(b.dataset.val)===val) { b.classList.add('selected'); b.classList.remove('faded'); }
        else { b.classList.add('faded'); b.classList.remove('selected'); }
    });
    var pocket = valEl && valEl.closest ? valEl.closest('.dice-pocket') : null;
    if (pocket) pocket.classList.add('tapped');
}

function lockPocket(key) {
    var valEl = document.getElementById('dval-'+key);
    if (!valEl) return;
    var pocket = valEl.closest ? valEl.closest('.dice-pocket') : null;
    if (!pocket) return;
    var numRow = pocket.querySelector('.num-row');
    if (numRow) {
        numRow.style.pointerEvents = 'none';
        numRow.style.opacity = '0.25';
    }
    pocket.style.opacity = '0.8';
    pocket.title = 'Carried over from last round';
}

function makeSharePlayerRow(containerId, key, color, name) {
    var row = document.getElementById(containerId);
    if (!row) return;
    row.innerHTML = '';

    var sp = document.getElementById('share-pocket');
    var grid = document.getElementById('dice-wrap');
    if (!sp || !grid) return;
    if (isRD) {
        // RD mode: center bottom = 2x2 grid [Blue RD3 | Red RD3] / [Blue RD4 | Red RD4]
        grid.classList.add('rd-mode');
        sp.style.cssText = 'background:transparent;border:none;padding:0;display:flex;flex-direction:column;gap:4px;flex-shrink:0;';
        sp.innerHTML = '';
        var rdRow1 = document.createElement('div');
        rdRow1.style.cssText = 'display:flex;flex-direction:row;gap:4px;';
        var brd3 = makeSplitShare('bdie3','blue','RD 3'); brd3.style.flex='1';
        var rrd3 = makeSplitShare('rdie3','red','RD 3');  rrd3.style.flex='1';
        rdRow1.appendChild(brd3); rdRow1.appendChild(rrd3);
        var rdRow2 = document.createElement('div');
        rdRow2.style.cssText = 'display:flex;flex-direction:row;gap:4px;';

function makeSplitShare(key, color, label) {
    var div = document.createElement('div');
    div.className = 'dice-pocket ' + (color==='blue'?'blue-pocket':'red-pocket');
    var lbl = document.createElement('div');
    lbl.className = 'pocket-lbl';
    lbl.textContent = label || 'Share';
    var val = document.createElement('div');
    val.className = 'pocket-val '+(color==='blue'?'blue-val':'red-val')+' empty';
    val.id = 'dval-'+key; val.textContent = '\u00b7';
    var nums = document.createElement('div'); nums.className = 'num-row';
    for (var n=1; n<=6; n++) nums.appendChild(makeNumBtn(n, key, color));
    div.appendChild(lbl); div.appendChild(val); div.appendChild(nums);
    return div;
}

function makePocket(cls, key, label, color, showLabel) {
    var div = document.createElement('div');
    div.className = 'dice-pocket ' + cls;
    if (showLabel) {
        var lbl = document.createElement('div');
        lbl.className = 'pocket-lbl'; lbl.textContent = label;
        div.appendChild(lbl);
    }
    var val = document.createElement('div');
    val.className = 'pocket-val ' + (color==='blue'?'blue-val':'red-val') + ' empty';
    val.id = 'dval-'+key; val.textContent = '\u00b7';
    var row = document.createElement('div'); row.className = 'num-row';
    for (var n=1; n<=6; n++) row.appendChild(makeNumBtn(n, key, color));
    div.appendChild(val); div.appendChild(row);
    return div;
}

function makeNumBtn(n, key, color) {
    var btn = document.createElement('button');
    btn.className = 'num-btn '+(color==='blue'?'blue-btn':'red-btn');
    btn.textContent = n;
    btn.dataset.key = key; btn.dataset.val = n;
    (function(k,v,c){ btn.addEventListener('click', function(){ tapDie(k,v,c); }); })(key,n,color);
    return btn;
}

function renderDiceSheet() {
    var tbody = document.getElementById('dtbody');
    if (!tbody) return;
    tbody.innerHTML = '';
    var rdIdx = getRDIdx();

    if (rdIdx >= 0) {
        // RD mode: show only last 2 complete regular rounds + RD row (compact, no scroll needed)
        var regularDone = rounds.slice(0, rdIdx).filter(function(r){ return r.p1!==null; });
        var last2 = regularDone.slice(-2);
        var last2Start = rdIdx - last2.length;
        last2.forEach(function(r, di) {
            var realIdx = last2Start + di;
            var tr = document.createElement('tr');
            var tn=document.createElement('td'); tn.className='rn'; tn.textContent=(realIdx+1);
            var t1=document.createElement('td'); t1.className='p1c'; t1.style.cssText='padding:3px 2px;text-align:center;color:#b0d0ff;font-size:0.95em;'; t1.textContent=r.p1!==null?r.p1:'';
            var t2=document.createElement('td'); t2.className='p2c'; t2.style.cssText='padding:3px 2px;text-align:center;color:#ffb0b0;font-size:0.95em;'; t2.textContent=r.p2!==null?r.p2:'';
            tr.appendChild(tn); tr.appendChild(t1); tr.appendChild(t2);
            tbody.appendChild(tr);
        });
        // RD row if complete
        var rdRound = rounds[rdIdx];
        if (rdRound && rdRound.p1!==null) {
            var tr = document.createElement('tr'); tr.className='rd-row';
            var tn=document.createElement('td'); tn.className='rn rd'; tn.textContent='RD';
            var t1=document.createElement('td'); t1.className='p1c'; t1.style.cssText='padding:5px 3px;text-align:center;color:#1a2744;font-size:1.05em;font-weight:bold;'; t1.textContent=rdRound.p1;
            var t2=document.createElement('td'); t2.className='p2c'; t2.style.cssText='padding:5px 3px;text-align:center;color:#1a2744;font-size:1.05em;font-weight:bold;'; t2.textContent=rdRound.p2;
            tr.appendChild(tn); tr.appendChild(t1); tr.appendChild(t2);
            tbody.appendChild(tr);
        }
    } else {
        // Regular mode: show all complete rounds, auto-scroll to bottom
        rounds.forEach(function(r, i) {
            if (r.p1===null && r.p2===null && i===rounds.length-1) return;
            var tr = document.createElement('tr');
            var tn=document.createElement('td'); tn.className='rn'; tn.textContent=(i+1);
            var t1=document.createElement('td'); t1.className='p1c'; t1.style.cssText='padding:3px 2px;text-align:center;color:#b0d0ff;font-size:0.95em;'; t1.textContent=r.p1!==null?r.p1:'';
            var t2=document.createElement('td'); t2.className='p2c'; t2.style.cssText='padding:3px 2px;text-align:center;color:#ffb0b0;font-size:0.95em;'; t2.textContent=r.p2!==null?r.p2:'';
            tr.appendChild(tn); tr.appendChild(t1); tr.appendChild(t2);
            tbody.appendChild(tr);
        });
        var wrap = document.getElementById('dice-score-center');
        if (wrap) setTimeout(function(){ wrap.scrollTop = wrap.scrollHeight; }, 30);
    }

    // Live current round row
    var ltr = document.createElement('tr');
    ltr.style.background = 'rgba(200,168,75,0.06)';
    var ln=document.createElement('td'); ln.className='rn'; ln.textContent=rounds.length; ln.style.color='#c8a84b';
    var lb=document.createElement('td'); lb.id='live-b'; lb.className='p1c'; lb.style.cssText='padding:3px 2px;text-align:center;color:#90c0ff;font-weight:bold;font-size:1em;'; lb.textContent='—';
    var lr=document.createElement('td'); lr.id='live-r'; lr.className='p2c'; lr.style.cssText='padding:3px 2px;text-align:center;color:#ff9090;font-weight:bold;font-size:1em;'; lr.textContent='—';
    ltr.appendChild(ln); ltr.appendChild(lb); ltr.appendChild(lr);
    tbody.appendChild(ltr);

    // Running totals
    var t1=0,t2=0;
    rounds.forEach(function(r){if(r.p1!==null)t1+=r.p1;if(r.p2!==null)t2+=r.p2;});
    var dt1=document.getElementById('dt1'); var dt2=document.getElementById('dt2');
    if(dt1) dt1.textContent=t1; if(dt2) dt2.textContent=t2;
}

function tapDie(key, val, color, btn) {
    dv[key] = val;
    // Update value display for non-share pockets
    var valEl = document.getElementById('dval-'+key);
    if (valEl) {
        valEl.textContent = val;
        valEl.classList.remove('empty');
        valEl.style.color = (color==='blue') ? '#7ab8f5' : '#e07878';
        valEl.style.textShadow = '0 2px 4px rgba(0,0,0,0.7), 0 1px 0 rgba(0,0,0,0.5)';
        valEl.style.fontSize = '';
    }
    // Fade other buttons in this pocket, highlight selected
    var allBtns = document.querySelectorAll('[data-key="'+key+'"]');
    allBtns.forEach(function(b){
        if (parseInt(b.dataset.val)===val) {
            b.classList.add('selected'); b.classList.remove('faded');
        } else {
            b.classList.add('faded'); b.classList.remove('selected');
        }
    });
    // Handle Share resolution
    if (key==='shareB' || key==='shareR') {
        resolveShare();
    }
    updateDiceTotals();
    checkRoundComplete();
}

function setShareResult(msg, color) {
    var bar = document.getElementById('dice-bonus-bar');
    if (!bar) return;
    bar.dataset.shareResult = msg;
    bar.dataset.shareColor  = color || '';
    refreshBonusBar();
}
function refreshBonusBar() {
    var bar = document.getElementById('dice-bonus-bar');
    if (!bar) return;
    var sm = bar.dataset.shareResult || '';
    var sc = bar.dataset.shareColor  || '#c8b88a';
    var cm = bar.dataset.comboResult || '';
    if (sm && cm) {
        bar.innerHTML = '<span style="color:'+sc+'">'+sm+'</span>  —  '+cm;
    } else if (sm) {
        bar.innerHTML = '<span style="color:'+sc+'">'+sm+'</span>';
    } else {
        bar.textContent = cm || 'Combo: —';
    }
}
function resolveShare() {
    if (dv.shareB===null || dv.shareR===null) { setShareResult('',''); return; }
    var b=dv.shareB, r=dv.shareR, diff=Math.abs(b-r);
    if (b>r)      setShareResult(db.p1+' takes Share +'+diff+' — bonus after round','#90c0ff');
    else if (r>b) setShareResult(db.p2+' takes Share +'+diff+' — bonus after round','#ff9090');
    else          setShareResult('Tied — Share scores 0','#c8b88a');
}


function getDiceScores() {
    var rdIdx = getRDIdx();
    var lastR = rounds[rounds.length-1];
    var isRD = (rdIdx >= 0 && rounds.length - 1 === rdIdx && lastR.p1===null && lastR.p2===null);
    if (isRD) {
        // Rolldown: all 5 dice score face value, combo on all 5, no Share
        var bScore = (dv.bk1||0)+(dv.bk2||0)+(dv.bdie3||0)+(dv.bdie4||0)+(dv.bsave||0);
        var rScore = (dv.rk1||0)+(dv.rk2||0)+(dv.rdie3||0)+(dv.rdie4||0)+(dv.rsave||0);
        var bDice = [dv.bk1,dv.bk2,dv.bdie3,dv.bdie4,dv.bsave].filter(function(d){return d!==null;});
        var rDice = [dv.rk1,dv.rk2,dv.rdie3,dv.rdie4,dv.rsave].filter(function(d){return d!==null;});
        var bCombo = calcCombo(bDice); bScore += bCombo;
        var rCombo = calcCombo(rDice); rScore += rCombo;
        return {bScore:bScore, rScore:rScore, bCombo:bCombo, rCombo:rCombo};
    }
    // Regular round: K1+K2 score; Save=0; winner of Share scores diff + combo on 4 dice
    var bScore = (dv.bk1||0) + (dv.bk2||0);
    var rScore = (dv.rk1||0) + (dv.rk2||0);
    var bShareWon = dv.shareB!==null && dv.shareR!==null && dv.shareB > dv.shareR;
    var rShareWon = dv.shareR!==null && dv.shareB!==null && dv.shareR > dv.shareB;
    var shareDiff = (dv.shareB!==null && dv.shareR!==null) ? Math.abs(dv.shareB - dv.shareR) : 0;
    if (bShareWon) bScore += shareDiff;
    if (rShareWon) rScore += shareDiff;
    var bCombo = 0, rCombo = 0;
    if (bShareWon) {
        bCombo = calcCombo([dv.bk1,dv.bk2,dv.shareB,dv.bsave].filter(function(d){return d!==null;}));
        bScore += bCombo;
    }
    if (rShareWon) {
        rCombo = calcCombo([dv.rk1,dv.rk2,dv.shareR,dv.rsave].filter(function(d){return d!==null;}));
        rScore += rCombo;
    }
    return {bScore:bScore, rScore:rScore, bCombo:bCombo, rCombo:rCombo};
}

function updateDiceTotals() {
    var s = getDiceScores();
    var t1=0, t2=0;
    rounds.forEach(function(r){ if(r.p1!==null)t1+=r.p1; if(r.p2!==null)t2+=r.p2; });
    var dt1=document.getElementById('dt1');
    var dt2=document.getElementById('dt2');
    if (dt1) dt1.textContent = t1 + s.bScore;
    if (dt2) dt2.textContent = t2 + s.rScore;
    // Update live current-round row
    var lb=document.getElementById('live-b');
    var lr=document.getElementById('live-r');
    if (lb) lb.textContent = s.bScore > 0 && (dv.bk1!==null||dv.bk2!==null) ? s.bScore : '\u2014';
    if (lr) lr.textContent = s.rScore > 0 && (dv.rk1!==null||dv.rk2!==null) ? s.rScore : '\u2014';
    // Bonus bar
    var bCn=comboName(s.bCombo), rCn=comboName(s.rCombo);
    var bar='';
    if (bCn) bar += db.p1+': '+bCn+' +'+s.bCombo;
    if (bCn&&rCn) bar += '   \u2014   ';
    if (rCn) bar += db.p2+': '+rCn+' +'+s.rCombo;
    var bonusEl=document.getElementById('dice-bonus-bar');
    if (bonusEl) { bonusEl.dataset.comboResult = bar; refreshBonusBar(); }
}

function checkRoundComplete() {
    var rdIdx = getRDIdx();
    var lastR2 = rounds[rounds.length-1];
    var isRD = (rdIdx >= 0 && rounds.length - 1 === rdIdx && lastR2.p1===null && lastR2.p2===null);
    function unset(v){ return v == null; } // catches both null and undefined
    if (isRD) {
        if (unset(dv.bk1)||unset(dv.bk2)||unset(dv.bdie3)||unset(dv.bdie4)||unset(dv.bsave)||
            unset(dv.rk1)||unset(dv.rk2)||unset(dv.rdie3)||unset(dv.rdie4)||unset(dv.rsave)) return;
    } else {
        if (unset(dv.bk1)||unset(dv.bk2)||unset(dv.bsave)||
            unset(dv.rk1)||unset(dv.rk2)||unset(dv.rsave)||
            unset(dv.shareB)||unset(dv.shareR)) return;
    }
    setTimeout(finalizeRound, 700);
}

// ---- Flash card handlers (module-level, no closure traps) ----
function getFlash() { return document.getElementById('flash'); }
function hideFlashCard() {
    var el = getFlash(); if (!el) return;
    el.style.display = 'none';
    el.style.pointerEvents = 'none';
    el.style.cursor = 'default';
    el.onclick = null;
}
function onRoundDismiss() {
    hideFlashCard();
    savedBSave = dv.bsave; savedRSave = dv.rsave;
    dv = {bk1:null,bk2:null,bdie3:null,bdie4:null,bsave:null,rk1:null,rk2:null,rdie3:null,rdie4:null,rsave:null,shareB:null,shareR:null};
    var rdIdx = getRDIdx();
    var rdDone = rdIdx >= 0 && rounds[rdIdx] && rounds[rdIdx].p1!==null && rounds[rdIdx].p2!==null;
    if (rdDone) { showWinnerCard(rdIdx); return; }
    buildDiceBoard();
    var lastR = rounds[rounds.length-1];
    if (rdIdx >= 0 && rounds.length-1 === rdIdx && lastR.p1===null && lastR.p2===null) {
        setTimeout(function(){
            showFlash('\u2605 ROLLDOWN ROUND! \u2605 Use all your dice \u2014 score big!', 2500);
        }, 150);
    }
}
function onWinnerDismiss() {
    hideFlashCard();
    // Stay in current mode — players choose Save Game or New Game themselves
}
function showWinnerCard(rdIdx) {
    var el = getFlash(); if (!el) return;
    var t1=0, t2=0;
    rounds.forEach(function(r){ if(r.p1!==null)t1+=r.p1; if(r.p2!==null)t2+=r.p2; });
    var rdP1 = rounds[rdIdx].p1, rdP2 = rounds[rdIdx].p2;
    var winner=null, tiebreak=false;
    if (t1>t2) { winner=db.p1; }
    else if (t2>t1) { winner=db.p2; }
    else { tiebreak=true; if(rdP1>rdP2) winner=db.p1; else if(rdP2>rdP1) winner=db.p2; }
    el.innerHTML = winner
        ? '<div style="font-size:0.65em;letter-spacing:0.14em;margin-bottom:10px;opacity:0.7">GAME OVER</div>'+
          '<div style="font-size:2.2em;font-weight:bold;line-height:1;margin-bottom:4px">'+winner+'</div>'+
          '<div style="font-size:1em;font-weight:bold;letter-spacing:0.1em;margin-bottom:10px">WINS!</div>'+
          '<div style="font-size:0.8em;opacity:0.75;margin-bottom:'+(tiebreak?'4':'10')+'px">'+t1+' \u2014 '+t2+'</div>'+
          (tiebreak?'<div style="font-size:0.65em;opacity:0.6;margin-bottom:10px">Tied \u2014 '+winner+' wins by Rolldown ('+rdP1+' vs '+rdP2+')</div>':'')+
          '<div style="font-size:0.78em;background:rgba(26,39,68,0.2);border-radius:4px;padding:8px 28px;display:inline-block;letter-spacing:0.08em">✕&nbsp; Close</div>'
        : '<div style="font-size:0.65em;letter-spacing:0.14em;margin-bottom:10px;opacity:0.7">GAME OVER</div>'+
          '<div style="font-size:1.8em;font-weight:bold;margin-bottom:8px">Perfect Tie!</div>'+
          '<div style="font-size:0.85em;opacity:0.75;margin-bottom:10px">'+t1+' \u2014 '+t2+' (Rolldown '+rdP1+' vs '+rdP2+')</div>'+
          '<div style="font-size:0.78em;background:rgba(26,39,68,0.2);border-radius:4px;padding:8px 28px;display:inline-block;letter-spacing:0.08em">✕&nbsp; Close</div>';
    el.style.display = 'block';
    el.style.cursor = 'pointer';
    el.style.pointerEvents = 'auto';
    el.onclick = onWinnerDismiss;
}
function finalizeRound() {
    var s = getDiceScores();
    var rn = rounds.length;
    var shareRes = document.getElementById('share-result');
    if (shareRes && shareRes.textContent.indexOf('bonus after round') >= 0) {
        var bShareWon = dv.shareB!==null && dv.shareR!==null && dv.shareB > dv.shareR;
        var rShareWon = dv.shareR!==null && dv.shareB!==null && dv.shareR > dv.shareB;
        var sdiff = (dv.shareB!==null && dv.shareR!==null) ? Math.abs(dv.shareB-dv.shareR) : 0;
        var sWinner = bShareWon ? db.p1 : rShareWon ? db.p2 : null;
        var sCombo  = bShareWon ? s.bCombo : rShareWon ? s.rCombo : 0;
        if (sWinner) {
            shareRes.textContent = sCombo > 0
                ? sWinner+' takes Share +'+sdiff+' + '+comboName(sCombo)+' (+'+sCombo+')'
                : sWinner+' takes Share +'+sdiff+' (no combo bonus)';
            shareRes.style.color = bShareWon ? '#90c0ff' : '#ff9090';
        }
    }
    if (rounds[rounds.length-1].p1===null && rounds[rounds.length-1].p2===null) {
        rounds[rounds.length-1] = {p1:s.bScore, p2:s.rScore};
    } else {
        rounds.push({p1:s.bScore, p2:s.rScore});
    }
    saveCur();
    var rdIdx = getRDIdx();
    if (rounds.length-1 !== rdIdx) rounds.push({p1:null, p2:null});
    renderSheet();
    renderDiceSheet();
    if (flashTimer) { clearTimeout(flashTimer); flashTimer=null; }
    var t1=0, t2=0;
    rounds.forEach(function(r){if(r.p1!==null)t1+=r.p1;if(r.p2!==null)t2+=r.p2;});
    var mg = Math.abs(t1-t2);
    var lead = t1>t2 ? db.p1+' leads by '+mg : t2>t1 ? db.p2+' leads by '+mg : 'Tied at '+t1;
    var el = getFlash();
    if (!el) return;
    el.innerHTML =
        '<div style="font-size:0.8em;letter-spacing:0.1em;margin-bottom:8px">ROUND '+rn+' COMPLETE</div>'+
        '<div style="display:flex;gap:20px;justify-content:center;margin-bottom:10px">'+
          '<div><div style="font-size:0.7em;color:rgba(26,39,68,0.7)">'+db.p1+'</div>'+
              '<div style="font-size:2em;font-weight:bold">'+s.bScore+'</div></div>'+
          '<div style="font-size:1.4em;align-self:center">\u2014</div>'+
          '<div><div style="font-size:0.7em;color:rgba(26,39,68,0.7)">'+db.p2+'</div>'+
              '<div style="font-size:2em;font-weight:bold">'+s.rScore+'</div></div>'+
        '</div>'+
        '<div style="font-size:0.75em;margin-bottom:12px;color:rgba(26,39,68,0.8)">'+lead+'</div>'+
        '<div style="font-size:0.8em;background:rgba(26,39,68,0.15);border-radius:4px;padding:7px 16px;display:inline-block">Tap to continue</div>';
    el.style.display = 'block';
    el.style.cursor = 'pointer';
    el.style.pointerEvents = 'auto';
    el.onclick = onRoundDismiss;
}

// == Save / New game ================================================
document.getElementById('btn-save').addEventListener('click', function(){
    var hasAny = rounds.some(function(r){ return r.p1!==null||r.p2!==null; });
    if (!hasAny) { toast('No scores to save yet.'); return; }
    var rdIdx  = getRDIdx();
    var rdDone = rdIdx>=0&&rounds[rdIdx]&&rounds[rdIdx].p1!==null&&rounds[rdIdx].p2!==null;
    if (!rdDone) { toast('Finish the Rolldown round before saving.'); return; }
    ask('Save this game to history?', function(){
        var t1=0,t2=0,saved=[];
        rounds.forEach(function(r){
            if(r.p1!==null||r.p2!==null){
                var p1=r.p1||0,p2=r.p2||0;
                t1+=p1;t2+=p2;saved.push({p1:p1,p2:p2});
            }
        });
        var g={date:new Date().toISOString(),p1:db.p1,p2:db.p2,t1:t1,t2:t2,winner:t1>t2?'p1':t2>t1?'p2':'tie',rounds:saved};
        db.games.unshift(g); saveDB(); clearCur();
        var wname=t1>t2?db.p1:t2>t1?db.p2:null, mg=Math.abs(t1-t2);
        if (diceMode) {
            // Dice Board: stay in mode, toast result, reset board
            toast((wname ? wname+' wins! ' : "Tie! ") + 'Saved ★');
            setTimeout(function(){
                rounds=[{p1:null,p2:null}];
                dv={bk1:null,bk2:null,bdie3:null,bdie4:null,bsave:null,rk1:null,rk2:null,rdie3:null,rdie4:null,rsave:null,shareB:null,shareR:null};
                savedBSave=null; savedRSave=null;
                buildDiceBoard();
            }, 1800);
        } else {
            // Tally Mode: show winner banner, reset sheet
            document.getElementById('wn').textContent=wname?wname+' Wins!':"It's a Tie!";
            document.getElementById('wm').textContent=wname?'By '+mg+' point'+(mg===1?'':'s')+' — saved!':'Saved!';
            document.getElementById('winner-banner').style.display='block';
            setTimeout(function(){
                document.getElementById('winner-banner').style.display='none';
                rounds=[{p1:null,p2:null}]; renderSheet();
            },2500);
        }
    });
});

document.getElementById('btn-new').addEventListener('click', function(){
    var hasAny=rounds.some(function(r){return r.p1!==null||r.p2!==null;});
    if(!hasAny){rounds=[{p1:null,p2:null}];renderSheet();return;}
    ask('Clear current game and start fresh?',function(){
        clearCur(); rounds=[{p1:null,p2:null}];
        document.getElementById('winner-banner').style.display='none';
        document.getElementById('announce').style.display='none';
        if(diceMode){dv={bk1:null,bk2:null,bdie3:null,bdie4:null,bsave:null,rk1:null,rk2:null,rdie3:null,rdie4:null,rsave:null,shareB:null,shareR:null};savedBSave=null;savedRSave=null;buildDiceBoard();}else{renderSheet();}
    });
});

// == History ========================================================
function renderHistory() {
    var games=db.games||[];
    var w1=0,w2=0;
    games.forEach(function(g){if(g.winner==='p1')w1++;else if(g.winner==='p2')w2++;});
    document.getElementById('wc1n').textContent=w1;
    document.getElementById('wc2n').textContent=w2;
    document.getElementById('wn1').textContent=db.p1;
    document.getElementById('wn2').textContent=db.p2;
    var list=document.getElementById('hist-list');
    if(!games.length){list.innerHTML='<p class="empty">No games saved yet.</p>';return;}
    list.innerHTML='';
    games.forEach(function(g,i){
        var d=new Date(g.date);
        var ds=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'2-digit'});
        var ts=d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        var wn=g.winner==='p1'?g.p1:g.winner==='p2'?g.p2:'Tie';
        var mg=Math.abs((g.t1||0)-(g.t2||0));
        var div=document.createElement('div');
        div.className='game-card'+(g.winner==='p1'?' gw1':g.winner==='p2'?' gw2':'');
        div.innerHTML=
            '<div class="gc-top"><span>'+ds+' \u00b7 '+ts+'</span><span>Game #'+(games.length-i)+'</span></div>'+
            '<div class="gc-row">'+
              '<div class="gc-p1">'+g.p1+'<span class="gc-sc">'+g.t1+'</span></div>'+
              '<div class="gc-mid"><span class="gc-wl">'+wn+'</span>by '+mg+'</div>'+
              '<div class="gc-p2">'+g.p2+'<span class="gc-sc">'+g.t2+'</span></div>'+
            '</div>';
        list.appendChild(div);
    });
}

document.getElementById('btn-clr').addEventListener('click', function(){
    if(!(db.games||[]).length){toast('History is already empty.');return;}
    ask('Clear all history? This cannot be undone.',function(){
        db.games=[];saveDB();renderHistory();renderRecords('');toast('History cleared.');
    });
});

// == Records ========================================================
function buildStats() {
    var ps={};
    (db.games||[]).forEach(function(g){
        var k1=(g.p1||'').toLowerCase().trim();
        var k2=(g.p2||'').toLowerCase().trim();
        if(!k1||!k2) return;
        if(!ps[k1]) ps[k1]={name:g.p1,games:0,wins:0,losses:0,ties:0,total:0,scores:[],opps:{}};
        if(!ps[k2]) ps[k2]={name:g.p2,games:0,wins:0,losses:0,ties:0,total:0,scores:[],opps:{}};
        var p1=ps[k1],p2=ps[k2];
        p1.games++;p1.total+=g.t1||0;p1.scores.push({s:g.t1||0,opp:g.p2,d:g.date});
        p2.games++;p2.total+=g.t2||0;p2.scores.push({s:g.t2||0,opp:g.p1,d:g.date});
        if(g.winner==='p1'){p1.wins++;p2.losses++;}
        else if(g.winner==='p2'){p2.wins++;p1.losses++;}
        else{p1.ties++;p2.ties++;}
        if(!p1.opps[k2]) p1.opps[k2]={name:g.p2,w:0,l:0,t:0};
        if(!p2.opps[k1]) p2.opps[k1]={name:g.p1,w:0,l:0,t:0};
        if(g.winner==='p1'){p1.opps[k2].w++;p2.opps[k1].l++;}
        else if(g.winner==='p2'){p2.opps[k1].w++;p1.opps[k2].l++;}
        else{p1.opps[k2].t++;p2.opps[k1].t++;}
    });
    return ps;
}

function renderRecords(filter) {
    var el=document.getElementById('rec-content');
    var ps=buildStats();
    var keys=Object.keys(ps);
    if(!keys.length){el.innerHTML='<p class="empty">Records appear after you save some games.</p>';return;}
    var q=(filter||'').toLowerCase().trim();
    if(q) keys=keys.filter(function(k){return k.indexOf(q)>=0;});
    keys.sort(function(a,b){return ps[b].games-ps[a].games;});
    el.innerHTML='';
    keys.forEach(function(key){
        var p=ps[key];
        var avg=p.games?Math.round(p.total/p.games):0;
        var pct=p.games?Math.round((p.wins/p.games)*100):0;
        var best=p.scores.slice().sort(function(a,b){return b.s-a.s;}).slice(0,5);
        function fd(iso){var d=new Date(iso);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});}
        var oppKeys=Object.keys(p.opps).sort(function(a,b){return (p.opps[b].w+p.opps[b].l+p.opps[b].t)-(p.opps[a].w+p.opps[a].l+p.opps[a].t);});
        var h2h=oppKeys.map(function(ok){
            var o=p.opps[ok];
            var rec=o.w+'-'+o.l+(o.t?'-'+o.t:'');
            return '<tr><td>vs '+o.name+'</td><td>'+rec+'</td></tr>';
        }).join('');
        var top5=best.map(function(s,i){
            return '<tr><td>'+(i+1)+'</td><td>'+s.s+'</td><td>vs '+s.opp+'</td><td>'+fd(s.d)+'</td></tr>';
        }).join('');
        var card=document.createElement('div');
        card.className='player-card';
        card.innerHTML=
            '<div class="player-card-hdr">'+
              '<div class="pc-name">'+p.name+'</div>'+
              '<div class="pc-meta">'+p.games+' game'+(p.games!==1?'s':'')+' \u00b7 '+pct+'% wins</div>'+
              '<div class="pc-arrow">\u25b6</div>'+
            '</div>'+
            '<div class="player-card-body">'+
              '<div class="pc-stat-row">'+
                '<div class="pc-sbox"><div class="sv">'+p.wins+'</div><div class="sl">Wins</div></div>'+
                '<div class="pc-sbox"><div class="sv">'+p.losses+'</div><div class="sl">Losses</div></div>'+
                '<div class="pc-sbox"><div class="sv">'+avg+'</div><div class="sl">Avg</div></div>'+
                '<div class="pc-sbox"><div class="sv">'+p.games+'</div><div class="sl">Games</div></div>'+
              '</div>'+
              (h2h?'<div class="pc-section-title">Head to Head</div><table class="h2h-table">'+h2h+'</table>':'')+
              (top5?'<div class="pc-section-title">Top Scores</div><table class="top5-mini">'+top5+'</table>':'')+
            '</div>';
        card.querySelector('.player-card-hdr').addEventListener('click',function(){card.classList.toggle('open');});
        el.appendChild(card);
    });
}

document.getElementById('rec-search').addEventListener('input',function(){renderRecords(this.value);});
